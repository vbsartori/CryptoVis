<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MATRIX // CRYPTO TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --green: #00ff66;
  --green-mid: #00cc4d;
  --green-dim: #008833;
  --red: #ff2855;
  --red-dim: #aa1a36;
  --amber: #ffb300;
  --white-glow: #d8ffe5;
  --border: rgba(0, 255, 102, 0.22);
  --border-bright: rgba(0, 255, 102, 0.55);
  --shift-x: 0px;
  --shift-y: 0px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  cursor: crosshair;
  -webkit-font-smoothing: antialiased;
}

#matrix {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: block;
  width: 100vw;
  height: 100vh;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0, 18, 6, 0.35) 3px,
    rgba(0, 18, 6, 0.35) 4px
  );
  opacity: 0.45;
  mix-blend-mode: multiply;
  animation: scanShift 8s linear infinite;
}

@keyframes scanShift {
  0% { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

@media (prefers-reduced-motion: reduce) {
  body::before { animation: none; }
}

/* Vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 99;
  pointer-events: none;
  background:
    radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.55) 95%),
    radial-gradient(ellipse at top, rgba(0,40,15,0.15), transparent 60%);
}

.hud {
  position: fixed;
  inset: 0;
  z-index: 200;
  padding: 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
  transition: opacity 0.4s ease, transform 2.5s ease-in-out;
  /* OLED anti burn-in: gentle pixel drift, see pixelShift() */
  transform: translate(var(--shift-x), var(--shift-y));
}

.hud > *, .hud * { pointer-events: auto; }

body.kiosk .hud {
  opacity: 0;
  pointer-events: none;
}
body.kiosk .hud * { pointer-events: none; }
body.kiosk { cursor: none; }

/* === Top bar === */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 3px;
  background: rgba(0,0,0,0.72);
  border: 1px solid var(--border);
  padding: 11px 16px;
  letter-spacing: 0.05em;
  backdrop-filter: blur(3px);
  position: relative;
}

.brand::before {
  content: '';
  position: absolute;
  left: -1px; top: -1px;
  width: 14px; height: 14px;
  border-top: 2px solid var(--green);
  border-left: 2px solid var(--green);
  box-shadow: 0 0 6px rgba(0,255,102,0.4);
}
.brand::after {
  content: '';
  position: absolute;
  right: -1px; bottom: -1px;
  width: 14px; height: 14px;
  border-bottom: 2px solid var(--green);
  border-right: 2px solid var(--green);
  box-shadow: 0 0 6px rgba(0,255,102,0.4);
}

.brand .title {
  color: var(--green);
  text-shadow: 0 0 10px rgba(0,255,102,0.65);
  letter-spacing: 0.18em;
  font-size: 14px;
}

.brand .sub {
  color: var(--green-dim);
  font-size: 11px;
  opacity: 0.85;
  letter-spacing: 0.12em;
}

.blink::after {
  content: '_';
  animation: blink 1s steps(2) infinite;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

.controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn {
  background: rgba(0,0,0,0.72);
  border: 1px solid var(--border);
  color: var(--green);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0.14em;
  padding: 9px 14px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-transform: uppercase;
  backdrop-filter: blur(3px);
}

.btn:hover {
  background: rgba(0,255,102,0.08);
  border-color: var(--green);
  text-shadow: 0 0 8px rgba(0,255,102,0.7);
}

.btn.active {
  background: rgba(0,255,102,0.14);
  border-color: var(--green);
  color: var(--white-glow);
  text-shadow: 0 0 8px var(--green);
}

.btn-group {
  display: flex;
  border: 1px solid var(--border);
  backdrop-filter: blur(3px);
}
.btn-group .btn {
  border: none;
  border-right: 1px solid var(--border);
}
.btn-group .btn:last-child { border-right: none; }

/* === Bottom === */
footer {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.status-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--green-dim);
  letter-spacing: 0.13em;
  padding: 0 6px;
  flex-wrap: wrap;
  gap: 12px;
}

.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  margin-right: 7px;
  vertical-align: -1px;
  animation: pulse 1.4s ease-in-out infinite;
}

.dot.warn {
  background: var(--red);
  box-shadow: 0 0 10px var(--red);
}

.dot.stale {
  background: var(--amber);
  box-shadow: 0 0 10px var(--amber);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.35; transform: scale(0.85); }
}

.keys span { color: var(--green); opacity: 0.7; }
.keys b { color: var(--white-glow); font-weight: normal; }

.ticker {
  display: grid;
  grid-template-columns: 1.7fr 1fr 1fr 1fr 1fr;
  gap: 10px;
}

.card {
  background: rgba(0, 0, 0, 0.78);
  border: 1px solid var(--border);
  padding: 12px 16px 13px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  backdrop-filter: blur(4px);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 5px; height: 100%;
  background: var(--green);
  box-shadow: 0 0 12px var(--green), 0 0 24px rgba(0,255,102,0.4);
}

.card.down::before {
  background: var(--red);
  box-shadow: 0 0 12px var(--red), 0 0 24px rgba(255,40,85,0.4);
}

.card.nodata::before {
  background: var(--amber);
  box-shadow: 0 0 12px var(--amber);
}

.card.primary {
  border-color: var(--border-bright);
  padding: 12px 18px 14px;
}
.card.primary::before { width: 7px; }

/* Price-update flash */
@keyframes flashUp {
  0%   { background: rgba(0,255,102,0.20); }
  100% { background: rgba(0,0,0,0.78); }
}
@keyframes flashDown {
  0%   { background: rgba(255,40,85,0.20); }
  100% { background: rgba(0,0,0,0.78); }
}
.card.flash-up   { animation: flashUp 0.9s ease-out; }
.card.flash-down { animation: flashDown 0.9s ease-out; }

.card .corner {
  position: absolute;
  width: 10px;
  height: 10px;
}
.card .corner.tr { top: -1px; right: -1px; border-top: 1.5px solid var(--green-dim); border-right: 1.5px solid var(--green-dim); }
.card .corner.bl { bottom: -1px; left: -1px; border-bottom: 1.5px solid var(--green-dim); border-left: 1.5px solid var(--green-dim); }
.card.down .corner.tr { border-color: var(--red-dim); }
.card.down .corner.bl { border-color: var(--red-dim); }

.row1 {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}

.sym {
  color: var(--green);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-shadow: 0 0 4px rgba(0,255,102,0.4);
}
.card.down .sym {
  color: var(--red);
  text-shadow: 0 0 4px rgba(255,40,85,0.4);
}
.card.nodata .sym { color: var(--amber); text-shadow: 0 0 4px rgba(255,179,0,0.4); }

.card.primary .sym {
  font-size: 13px;
  text-shadow: 0 0 8px rgba(0,255,102,0.7);
}
.card.primary.down .sym {
  text-shadow: 0 0 8px rgba(255,40,85,0.7);
}

.name {
  color: var(--green-dim);
  font-size: 10px;
  letter-spacing: 0.14em;
  opacity: 0.7;
}

.price {
  font-family: 'VT323', monospace;
  font-size: 34px;
  color: var(--white-glow);
  text-shadow: 0 0 8px rgba(0,255,102,0.55);
  line-height: 0.95;
  letter-spacing: 0.01em;
}
.card.primary .price {
  font-size: 54px;
}
.card.down .price {
  text-shadow: 0 0 8px rgba(255,40,85,0.55);
}
.card.nodata .price {
  font-size: 22px;
  color: var(--amber);
  text-shadow: 0 0 8px rgba(255,179,0,0.4);
  opacity: 0.8;
}

.price .currency {
  font-size: 0.55em;
  opacity: 0.55;
  margin-right: 2px;
  vertical-align: 0.3em;
}

.change {
  font-size: 12px;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 1px;
}

.card.primary .change { font-size: 13px; }

.change.up { color: var(--green); text-shadow: 0 0 6px rgba(0,255,102,0.5); }
.change.down { color: var(--red); text-shadow: 0 0 6px rgba(255,40,85,0.5); }

.change .arrow { font-size: 10px; }
.change .period-tag {
  color: var(--green-dim);
  opacity: 0.55;
  font-size: 10px;
  letter-spacing: 0.15em;
  margin-left: auto;
}
.card.down .change .period-tag { color: var(--red-dim); }

.spark {
  width: 100%;
  height: 26px;
  display: block;
  margin-top: 4px;
  opacity: 0.9;
}
.card.primary .spark { height: 34px; }

/* === Boot === */
.boot {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--green);
  font-size: 14px;
  letter-spacing: 0.14em;
  transition: opacity 0.7s ease;
}

.boot.hidden {
  opacity: 0;
  pointer-events: none;
}

.boot .line {
  opacity: 0;
  animation: bootIn 0.4s forwards;
  text-shadow: 0 0 8px rgba(0,255,102,0.6);
}

@keyframes bootIn {
  0% { opacity: 0; transform: translateY(4px); }
  100% { opacity: 1; transform: translateY(0); }
}

.boot .pulse {
  margin-top: 22px;
  width: 80px;
  height: 2px;
  background: var(--green-dim);
  position: relative;
  overflow: hidden;
}
.boot .pulse::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  animation: pulseSlide 1.4s ease-in-out infinite;
}
@keyframes pulseSlide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

@media (max-width: 880px) {
  .ticker { grid-template-columns: 1fr 1fr; }
  .card.primary { grid-column: span 2; }
  .card.primary .price { font-size: 46px; }
  .brand .title { font-size: 12px; }
  .brand .sub { font-size: 10px; }
  .btn { padding: 8px 11px; font-size: 11px; }
  header { flex-direction: column; }
  .status-line { font-size: 10px; }
}
</style>

<script>
"use strict";

// === CONFIG ===
const COINS = [
  { id: 'bitcoin',      sym: 'BTC',  name: 'Bitcoin',     primary: true },
  { id: 'ethereum',     sym: 'ETH',  name: 'Ethereum' },
  { id: 'solana',       sym: 'SOL',  name: 'Solana' },
  { id: 'chainlink',    sym: 'LINK', name: 'Chainlink' },
  { id: 'hyperliquid',  sym: 'HYPE', name: 'Hyperliquid' },
];
const API_URL = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${COINS.map(c=>c.id).join(',')}&price_change_percentage=24h,7d&sparkline=true`;

const REFRESH_MS      = 45000;   // normal cadence
const BACKOFF_BASE_MS = 15000;   // first retry after failure
const BACKOFF_MAX_MS  = 300000;  // cap: 5 min
const STALE_MS        = 180000;  // data older than 3 min => stale warning

const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// === STATE ===
let coinData = {};
let prevPrices = {};
let currentPeriod = '24h';
let lastSyncAt = 0;
let failCount = 0;
let fetchTimer = null;

// === CANVAS / MATRIX RAIN ===
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const FONT_SIZE = 16;
let columns = [];
let cssW = 0, cssH = 0;

// Frame-rate-independent rain: fixed logical tick rate, regardless of display Hz
const RAIN_SPEEDS = [
  { label: 'SLOW', fps: 18 },
  { label: 'NORM', fps: 30 },
  { label: 'FAST', fps: 45 },
];
let rainSpeedIdx = REDUCED_MOTION ? 0 : 1;
let lastTickTime = 0;

const KATAKANA = 'ｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
const RAND_POOL = KATAKANA + '0123456789#$%&*+=<>?/';

function randomChar() {
  return RAND_POOL[Math.floor(Math.random() * RAND_POOL.length)];
}

function formatPrice(p) {
  if (p == null || isNaN(p)) return '--';
  if (p >= 10000) return Math.round(p).toLocaleString('en-US');
  if (p >= 100)   return p.toFixed(2);
  if (p >= 1)     return p.toFixed(2);
  return p.toFixed(4);
}

function changeFor(data) {
  if (!data) return null;
  return currentPeriod === '24h'
    ? data.price_change_percentage_24h_in_currency
    : data.price_change_percentage_7d_in_currency;
}

function tickerStringFor(coin) {
  const data = coinData[coin.id];
  if (!data) return null;
  const change = changeFor(data);
  if (change == null || isNaN(change)) return null;
  const sign = change >= 0 ? '+' : '';
  return {
    str: `[${coin.sym} ${formatPrice(data.current_price)} ${sign}${change.toFixed(2)}%]`,
    positive: change >= 0,
  };
}

function pickTickerString() {
  const pool = [];
  for (const c of COINS) {
    const t = tickerStringFor(c);
    if (!t) continue;
    const weight = c.primary ? 3 : 1;
    for (let i = 0; i < weight; i++) pool.push(t);
  }
  if (!pool.length) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function clearCanvas() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cssW, cssH);
}

function resize() {
  // HiDPI-aware sizing: render at native pixel density, lay out in CSS pixels
  const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2x: 4K TVs don't need more for rain
  cssW = window.innerWidth;
  cssH = window.innerHeight;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const colCount = Math.ceil(cssW / FONT_SIZE);
  const old = columns;
  columns = [];
  for (let i = 0; i < colCount; i++) {
    columns.push(makeColumn(i, old[i]));
  }
  clearCanvas();
}

function makeColumn(i, prev) {
  return {
    x: i * FONT_SIZE,
    y: prev ? prev.y : Math.random() * cssH,
    speed: 1 + Math.floor(Math.random() * 4), // 1..4 (ticks per advance)
    frame: Math.floor(Math.random() * 4),
    lastChar: null,
    lastWasTicker: false,
    lastWasPositive: true,
    tickerMode: false,
    tickerString: '',
    tickerIndex: 0,
    tickerPositive: true,
    resetChance: 0.965 + Math.random() * 0.03,
  };
}

function resetColumn(col) {
  col.y = -Math.floor(Math.random() * 30) * FONT_SIZE;
  col.lastChar = null;
  col.tickerMode = false;
  col.tickerIndex = 0;
  col.speed = 1 + Math.floor(Math.random() * 4);
  if (Object.keys(coinData).length && Math.random() < 0.42) {
    const t = pickTickerString();
    if (t) {
      col.tickerMode = true;
      col.tickerString = t.str;
      col.tickerPositive = t.positive;
    }
  }
}

function tick() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.075)';
  ctx.fillRect(0, 0, cssW, cssH);

  ctx.font = `${FONT_SIZE}px "Share Tech Mono", monospace`;
  ctx.textBaseline = 'top';

  for (const col of columns) {
    col.frame++;
    if (col.frame < col.speed) continue;
    col.frame = 0;

    const thisIsTicker = col.tickerMode;
    const thisIsPositive = col.tickerPositive;

    let char;
    if (col.tickerMode) {
      char = col.tickerString[col.tickerIndex];
      col.tickerIndex++;
      if (col.tickerIndex >= col.tickerString.length) {
        col.tickerMode = false;
        col.tickerIndex = 0;
      }
    } else {
      char = randomChar();
    }

    if (col.lastChar !== null) {
      let trailColor;
      if (col.lastWasTicker) {
        trailColor = col.lastWasPositive
          ? 'rgba(0, 255, 102, 0.97)'
          : 'rgba(255, 50, 90, 0.97)';
      } else {
        trailColor = 'rgba(0, 175, 60, 0.55)';
      }
      ctx.fillStyle = trailColor;
      ctx.fillText(col.lastChar, col.x, col.y - FONT_SIZE);
    }

    ctx.fillStyle = 'rgba(224, 255, 232, 0.98)';
    ctx.fillText(char, col.x, col.y);

    col.lastChar = char;
    col.lastWasTicker = thisIsTicker;
    col.lastWasPositive = thisIsPositive;

    col.y += FONT_SIZE;

    if (col.y > cssH && Math.random() > col.resetChance) {
      resetColumn(col);
    }
  }
}

function loop(ts) {
  const interval = 1000 / RAIN_SPEEDS[rainSpeedIdx].fps;
  if (ts - lastTickTime >= interval) {
    // Catch up at most one tick — avoids burst after tab switch
    lastTickTime = ts - ((ts - lastTickTime) % interval);
    tick();
  }
  requestAnimationFrame(loop);
}

// Clear stale frozen trails when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    clearCanvas();
    lastTickTime = performance.now();
    reacquireWakeLock();
  }
});

// === DATA FETCH (with exponential backoff) ===
function scheduleFetch(delay) {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(fetchData, delay);
}

async function fetchData() {
  try {
    const r = await fetch(API_URL, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const arr = await r.json();

    prevPrices = {};
    for (const id in coinData) prevPrices[id] = coinData[id].current_price;

    coinData = {};
    for (const item of arr) coinData[item.id] = item;

    failCount = 0;
    lastSyncAt = Date.now();
    setStatus('ok');
    stampSync();
    renderTicker();
    scheduleFetch(REFRESH_MS);
  } catch (e) {
    failCount++;
    setStatus('fail');
    console.error('[fetch]', e);
    // Exponential backoff: 15s, 30s, 60s, 120s, 240s, capped at 5 min.
    // Plays nice with CoinGecko free-tier 429s instead of hammering it.
    const delay = Math.min(BACKOFF_BASE_MS * Math.pow(2, failCount - 1), BACKOFF_MAX_MS);
    scheduleFetch(delay);
  }
}

function setStatus(mode) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.classList.remove('warn', 'stale');
  if (mode === 'ok') {
    txt.textContent = 'LINK ESTABLISHED';
  } else if (mode === 'stale') {
    dot.classList.add('stale');
    const age = Math.round((Date.now() - lastSyncAt) / 60000);
    txt.textContent = `DATA STALE · ${age}M OLD`;
  } else {
    dot.classList.add('warn');
    txt.textContent = `LINK DEGRADED · RETRY ${failCount}`;
  }
}

// Watchdog: flag data as stale if the last good sync is too old
setInterval(() => {
  if (lastSyncAt && Date.now() - lastSyncAt > STALE_MS) setStatus('stale');
}, 30000);

function stampSync() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('updateText').textContent = `SYNC :: ${hh}:${mm}:${ss}`;
}

// === SPARKLINES ===
function drawSpark(canvasEl, points, up) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = canvasEl.clientWidth || 120;
  const h = canvasEl.clientHeight || 26;
  canvasEl.width = Math.round(w * dpr);
  canvasEl.height = Math.round(h * dpr);
  const c = canvasEl.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (!points || points.length < 2) return;

  let min = Infinity, max = -Infinity;
  for (const p of points) { if (p < min) min = p; if (p > max) max = p; }
  const range = (max - min) || 1;
  const pad = 2;
  const stepX = (w - pad * 2) / (points.length - 1);
  const yFor = v => pad + (1 - (v - min) / range) * (h - pad * 2);

  const color = up ? 'rgba(0,255,102,' : 'rgba(255,50,90,';

  // Filled glow under the line
  c.beginPath();
  c.moveTo(pad, yFor(points[0]));
  for (let i = 1; i < points.length; i++) c.lineTo(pad + i * stepX, yFor(points[i]));
  c.lineTo(pad + (points.length - 1) * stepX, h);
  c.lineTo(pad, h);
  c.closePath();
  const grad = c.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '0.22)');
  grad.addColorStop(1, color + '0)');
  c.fillStyle = grad;
  c.fill();

  // Line
  c.beginPath();
  c.moveTo(pad, yFor(points[0]));
  for (let i = 1; i < points.length; i++) c.lineTo(pad + i * stepX, yFor(points[i]));
  c.strokeStyle = color + '0.9)';
  c.lineWidth = 1.4;
  c.shadowColor = color + '0.8)';
  c.shadowBlur = 4;
  c.stroke();
  c.shadowBlur = 0;
}

function sparkPointsFor(d) {
  const all = d.sparkline_in_7d && d.sparkline_in_7d.price;
  if (!all || !all.length) return null;
  // sparkline_in_7d = hourly points for 7 days (~168). 24H view = last 24 points.
  return currentPeriod === '24h' ? all.slice(-24) : all;
}

// === RENDER TICKER ===
function renderTicker() {
  const ticker = document.getElementById('ticker');
  ticker.innerHTML = '';
  const sparkJobs = [];

  for (const c of COINS) {
    const d = coinData[c.id];
    const card = document.createElement('div');

    if (!d) {
      // Coin missing from the API response: show it explicitly instead of vanishing
      card.className = `card nodata ${c.primary ? 'primary' : ''}`;
      card.innerHTML = `
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <div class="row1">
          <span class="sym">[ ${c.sym} ]</span>
          <span class="name">${c.name.toUpperCase()}</span>
        </div>
        <div class="price">NO SIGNAL</div>
        <div class="change"><span class="period-tag">AWAITING FEED</span></div>
      `;
      ticker.appendChild(card);
      continue;
    }

    const change = changeFor(d);
    const up = change == null ? true : change >= 0;
    const changeStr = (change == null || isNaN(change))
      ? '--'
      : `${up ? '+' : ''}${change.toFixed(2)}%`;

    // Flash when price moved since the previous sync
    let flashClass = '';
    const prev = prevPrices[c.id];
    if (prev != null && d.current_price !== prev) {
      flashClass = d.current_price > prev ? 'flash-up' : 'flash-down';
    }

    card.className = `card ${up ? 'up' : 'down'} ${c.primary ? 'primary' : ''} ${flashClass}`;
    card.innerHTML = `
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <div class="row1">
        <span class="sym">[ ${c.sym} ]</span>
        <span class="name">${c.name.toUpperCase()}</span>
      </div>
      <div class="price"><span class="currency">$</span>${formatPrice(d.current_price)}</div>
      <div class="change ${up ? 'up' : 'down'}">
        <span class="arrow">${up ? '▲' : '▼'}</span>
        <span>${changeStr}</span>
        <span class="period-tag">${currentPeriod.toUpperCase()}</span>
      </div>
      <canvas class="spark"></canvas>
    `;
    ticker.appendChild(card);

    const pts = sparkPointsFor(d);
    if (pts) sparkJobs.push([card.querySelector('.spark'), pts, up]);
  }

  // Draw sparklines after layout so clientWidth is real
  requestAnimationFrame(() => {
    for (const [el, pts, up] of sparkJobs) drawSpark(el, pts, up);
  });
}

// === OLED ANTI BURN-IN: subtle HUD pixel drift ===
// Shifts the static HUD by up to ±3px every 60s (same trick OLED TVs use).
// Imperceptible to viewers, but no pixel holds the same bright content for hours.
setInterval(() => {
  const x = (Math.random() * 6 - 3).toFixed(1);
  const y = (Math.random() * 6 - 3).toFixed(1);
  document.documentElement.style.setProperty('--shift-x', x + 'px');
  document.documentElement.style.setProperty('--shift-y', y + 'px');
}, 60000);

// === WAKE LOCK: keep the screen on in kiosk / fullscreen (TV mode) ===
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) { /* denied (battery saver etc.) — fail silently */ }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
function reacquireWakeLock() {
  // Wake locks auto-release when the tab hides; re-grab on return if still needed
  if ((document.body.classList.contains('kiosk') || document.fullscreenElement) && !wakeLock) {
    requestWakeLock();
  }
}
function syncWakeLock() {
  const need = document.body.classList.contains('kiosk') || !!document.fullscreenElement;
  if (need && !wakeLock) requestWakeLock();
  if (!need && wakeLock) releaseWakeLock();
}

// === CONTROLS ===
document.querySelectorAll('.period').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.period').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentPeriod = b.dataset.period;
    renderTicker();
  });
});

function toggleKiosk() {
  document.body.classList.toggle('kiosk');
  syncWakeLock();
}
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}
document.addEventListener('fullscreenchange', syncWakeLock);

function cycleRainSpeed() {
  rainSpeedIdx = (rainSpeedIdx + 1) % RAIN_SPEEDS.length;
  document.getElementById('rainBtn').textContent = 'RAIN: ' + RAIN_SPEEDS[rainSpeedIdx].label;
}

document.getElementById('kioskBtn').addEventListener('click', toggleKiosk);
document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);
document.getElementById('rainBtn').addEventListener('click', cycleRainSpeed);

// Double-click anywhere on the rain toggles kiosk — handy on a TV with no keyboard
canvas.addEventListener('dblclick', toggleKiosk);

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'k' || e.key === 'K') toggleKiosk();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 's' || e.key === 'S') cycleRainSpeed();
  if (e.key === 'Escape' && document.body.classList.contains('kiosk')) {
    document.body.classList.remove('kiosk');
    syncWakeLock();
  }
});

// Redraw sparklines on resize (card widths change)
let resizeT = null;
window.addEventListener('resize', () => {
  resize();
  clearTimeout(resizeT);
  resizeT = setTimeout(renderTicker, 250);
});

// === INIT ===
if (REDUCED_MOTION) {
  document.getElementById('rainBtn').textContent = 'RAIN: ' + RAIN_SPEEDS[rainSpeedIdx].label;
}
resize();
requestAnimationFrame(loop);

setTimeout(() => {
  document.getElementById('boot').classList.add('hidden');
}, 2100);

fetchData();
</script>
</body>
</html>
