<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050510">
<title>KLDSCP://2077 v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #050510; font-family: 'Courier New', monospace; }
#kal { position: fixed; inset: 0; width: 100vw; height: 100vh; touch-action: none; }

#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px;
  z-index: 10; pointer-events: none;
}
#topbar > * { pointer-events: auto; }
.logo { font-size: 14px; letter-spacing: 3px; color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.7); font-weight: bold; }
.logo em { font-style: normal; color: #ff2d95; text-shadow: 0 0 8px rgba(255,45,149,0.7); }

.nbtn {
  all: unset; cursor: pointer; font-family: inherit; font-size: 12px;
  padding: 9px 13px; border: 1px solid #00e5ff; color: #00e5ff; border-radius: 6px;
  background: rgba(5,5,16,0.6); backdrop-filter: blur(4px);
  text-shadow: 0 0 6px rgba(0,229,255,0.6);
  box-shadow: 0 0 10px rgba(0,229,255,0.25), inset 0 0 6px rgba(0,229,255,0.1);
  transition: opacity 0.2s;
}
.nbtn:active { background: #00e5ff; color: #050510; text-shadow: none; }
.nbtn.mag { border-color: #ff2d95; color: #ff2d95; text-shadow: 0 0 6px rgba(255,45,149,0.6); box-shadow: 0 0 10px rgba(255,45,149,0.25), inset 0 0 6px rgba(255,45,149,0.1); }
.nbtn.mag:active { background: #ff2d95; color: #050510; }
.nbtn.dim { opacity: 0.45; }

#hint {
  position: fixed; top: 50%; left: 0; right: 0; transform: translateY(-50%);
  text-align: center; font-size: 12px; letter-spacing: 2px;
  color: rgba(155,234,255,0.55); pointer-events: none; z-index: 5;
  transition: opacity 1s; padding: 0 30px; line-height: 2.3;
}
#hint b { color: #ff2d95; font-weight: normal; }

#fingers {
  position: fixed; top: calc(env(safe-area-inset-top, 0px) + 58px); right: 16px;
  font-size: 11px; letter-spacing: 2px; color: rgba(0,255,159,0.8);
  text-shadow: 0 0 6px rgba(0,255,159,0.5); z-index: 9; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}

#sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
  background: rgba(7,7,18,0.93); backdrop-filter: blur(10px);
  border-top: 1px solid #16213a;
  transform: translateY(calc(100% - 46px));
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  max-height: 75vh;
}
#sheet.open { transform: translateY(0); }
#sheetScroll { overflow-y: auto; max-height: calc(75vh - 46px); }
#grab {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  height: 46px; cursor: pointer; color: #4a5a7a; font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; user-select: none; -webkit-user-select: none;
}
#grab::before, #grab::after { content: ''; width: 40px; height: 1px; background: #23304d; }

.lbl { font-size: 10px; letter-spacing: 2px; color: #4a5a7a; padding: 10px 16px 4px; text-transform: uppercase; }
.row {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 16px 8px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.row::-webkit-scrollbar { display: none; }
.chip {
  all: unset; cursor: pointer; flex: 0 0 auto; font-family: inherit; font-size: 12px;
  padding: 10px 16px; color: #6b7a99; border: 1px solid #23304d; border-radius: 999px;
}
.chip.on { color: #00e5ff; border-color: #00e5ff; background: rgba(0,229,255,0.08); box-shadow: 0 0 8px rgba(0,229,255,0.3), inset 0 0 6px rgba(0,229,255,0.08); }
.chip.on.mg { color: #ff2d95; border-color: #ff2d95; background: rgba(255,45,149,0.08); box-shadow: 0 0 8px rgba(255,45,149,0.3), inset 0 0 6px rgba(255,45,149,0.08); }
.sw { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: -1px; }

.sliders { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 14px; padding: 4px 16px 16px; }
.sliders .lbl { padding: 8px 0 4px; }
.sliders .lbl b { color: #00e5ff; font-weight: normal; }
input[type=range] { width: 100%; accent-color: #00e5ff; height: 28px; }

@media (prefers-reduced-motion: reduce) { #sheet { transition: none; } }
</style>
</head>
<body>
<canvas id="kal"></canvas>

<div id="topbar">
  <span class="logo">KLDSCP<em>://</em>2077</span>
  <span style="display:flex;gap:8px;">
    <button class="nbtn" id="rtx">RTX ON</button>
    <button class="nbtn mag" id="pp" aria-label="Pausar">&#10074;&#10074;</button>
    <button class="nbtn" id="fs" aria-label="Tela cheia">&#x26F6;</button>
  </span>
</div>

<div id="fingers"></div>

<div id="hint">
  <b>1 dedo</b> desenha e controla<br>
  <b>2 dedos</b> giram e dão zoom (pinça)<br>
  <b>3 dedos</b> = três pincéis ao mesmo tempo<br>
  toque duplo limpa · barra de baixo abre controles
</div>

<div id="sheet">
  <div id="grab">Controles</div>
  <div id="sheetScroll">
    <div class="lbl">Efeito</div>
    <div class="row" id="rowFx">
      <button class="chip on" data-fx="lines">Linhas</button>
      <button class="chip" data-fx="ribbon">Fitas</button>
      <button class="chip" data-fx="poly">Cristais</button>
      <button class="chip" data-fx="bubbles">Plasma</button>
      <button class="chip" data-fx="web">Circuito</button>
      <button class="chip" data-fx="glitch">Glitch</button>
      <button class="chip" data-fx="laser">Laser</button>
      <button class="chip" data-fx="stars">Estrelas</button>
      <button class="chip" data-fx="waves">Ondas</button>
      <button class="chip" data-fx="petals">Pétalas</button>
      <button class="chip" data-fx="auto">Auto-DJ</button>
    </div>
    <div class="lbl">Paleta</div>
    <div class="row" id="rowPal">
      <button class="chip on mg" data-pal="cyber"><span class="sw" style="background:#00e5ff;"></span>Cyberpunk</button>
      <button class="chip mg" data-pal="synth"><span class="sw" style="background:#ff2d95;"></span>Synthwave</button>
      <button class="chip mg" data-pal="vapor"><span class="sw" style="background:#ff71ce;"></span>Vaporwave</button>
      <button class="chip mg" data-pal="matrix"><span class="sw" style="background:#00ff41;"></span>Matrix</button>
      <button class="chip mg" data-pal="toxic"><span class="sw" style="background:#ccff00;"></span>Tóxico</button>
      <button class="chip mg" data-pal="gold"><span class="sw" style="background:#ffd700;"></span>Ouro neon</button>
      <button class="chip mg" data-pal="ice"><span class="sw" style="background:#a8e6ff;"></span>Gelo</button>
      <button class="chip mg" data-pal="uv"><span class="sw" style="background:#b537f2;"></span>Ultravioleta</button>
      <button class="chip mg" data-pal="blood"><span class="sw" style="background:#ff1744;"></span>Blood red</button>
      <button class="chip mg" data-pal="chrome"><span class="sw" style="background:#e0f7ff;"></span>Cromado</button>
      <button class="chip mg" data-pal="rainbow"><span class="sw" style="background:#ff9e00;"></span>Arco-íris</button>
    </div>
    <div class="sliders">
      <div>
        <div class="lbl">Espelhos <b id="segOut">8</b></div>
        <input type="range" id="seg" min="4" max="24" step="2" value="8">
      </div>
      <div>
        <div class="lbl">Rastro</div>
        <input type="range" id="tr" min="1" max="10" step="1" value="6">
      </div>
      <div>
        <div class="lbl">Velocidade</div>
        <input type="range" id="spd" min="1" max="10" step="1" value="5">
      </div>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('kal');
const ctx = cv.getContext('2d');
let W, H, cx, cy;
const dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = Math.round(innerWidth * dpr);
  H = Math.round(innerHeight * dpr);
  cv.width = W; cv.height = H;
  cx = W / 2; cy = H / 2;
  ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, W, H);
}
resize();
addEventListener('resize', resize);
const SC = () => Math.min(W, H) / 700;

let fx = 'lines', pal = 'cyber', segments = 8, fade = 0.05, speed = 5;
let rtxOn = true, paused = false, autoDJ = false;
let t = 0, hue = 0, autoTimer = 0;
let a1 = Math.random() * 6.28, a2 = Math.random() * 6.28, a3 = Math.random() * 6.28;
let gRot = 0, gScale = 1;
let lastTap = 0;
const touches = new Map();
let gesture = null;
const fxList = ['lines', 'ribbon', 'poly', 'bubbles', 'web', 'glitch', 'laser', 'stars', 'waves', 'petals'];

const fixed = {
  cyber:  ['#00e5ff', '#ff2d95', '#b537f2', '#00ff9f'],
  synth:  ['#ff2d95', '#b537f2', '#ff6ec7', '#7a5cff'],
  vapor:  ['#ff71ce', '#01cdfe', '#05ffa1', '#b967ff'],
  matrix: ['#00ff41', '#65ff8f', '#008f11', '#9dffb0'],
  toxic:  ['#00ff9f', '#ccff00', '#00e5ff', '#7fff00'],
  gold:   ['#ffd700', '#ff9e00', '#fff1a8', '#ffb700'],
  ice:    ['#a8e6ff', '#e0f7ff', '#5ad0ff', '#ffffff'],
  uv:     ['#7a00ff', '#b537f2', '#ff2dff', '#9d4dff'],
  blood:  ['#ff1744', '#ff2d95', '#ff6d00', '#d50000'],
  chrome: ['#e0f7ff', '#9beaff', '#5a8fc7', '#ffffff']
};
function col(off) {
  const h = (hue + off) % 360;
  if (pal === 'rainbow') return 'hsl(' + h + ',100%,60%)';
  return fixed[pal][Math.floor(h / 90) % 4];
}
function glow(c, amt) {
  if (rtxOn) { ctx.shadowColor = c; ctx.shadowBlur = amt * dpr; }
  else ctx.shadowBlur = 0;
}

function mirrored(fn) {
  const seg = Math.PI * 2 / segments;
  for (let i = 0; i < segments; i++) {
    for (let m = 0; m < 2; m++) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(gRot + seg * i);
      if (m) ctx.scale(1, -1);
      ctx.scale(SC() * gScale, SC() * gScale);
      fn();
      ctx.restore();
    }
  }
}

function renderFigure(f, off) {
  const { x1, y1, x2, y2, x3, y3 } = f;
  if (fx === 'lines') {
    mirrored(() => {
      const c = col(off);
      glow(c, 12); ctx.strokeStyle = c; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const c2 = col(off + 120); glow(c2, 10); ctx.fillStyle = c2;
      ctx.beginPath(); ctx.arc(x2, y2, 3 + 2 * Math.sin(t * 5), 0, 6.29); ctx.fill();
    });
  } else if (fx === 'ribbon') {
    mirrored(() => {
      const c = col(off); glow(c, 14);
      ctx.strokeStyle = c; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(x2 * 1.4, y2 * 1.4, x3, y3); ctx.stroke();
      const c2 = col(off + 180); glow(c2, 8);
      ctx.strokeStyle = c2; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x1 * 0.6, y1 * 0.6);
      ctx.quadraticCurveTo(x2, y2, x3 * 1.2, y3 * 1.2); ctx.stroke();
    });
  } else if (fx === 'poly') {
    mirrored(() => {
      const c = col(off);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.3; ctx.fillStyle = c;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;
      const c2 = col(off + 90); glow(c2, 10);
      ctx.strokeStyle = c2; ctx.lineWidth = 1.5; ctx.stroke();
    });
  } else if (fx === 'bubbles') {
    mirrored(() => {
      const r = 6 + 9 * Math.abs(Math.sin(t * 1.7));
      const c = col(off); glow(c, 16);
      ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x2, y2, r, 0, 6.29); ctx.stroke();
      const c2 = col(off + 90); glow(c2, 8);
      ctx.globalAlpha = 0.4; ctx.fillStyle = c2;
      ctx.beginPath(); ctx.arc(x1, y1, r * 0.55, 0, 6.29); ctx.fill();
      ctx.globalAlpha = 1;
    });
  } else if (fx === 'web') {
    mirrored(() => {
      const c = col(off); glow(c, 8);
      ctx.strokeStyle = c; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.stroke();
      const c2 = col(off + 150);
      ctx.strokeStyle = c2; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(x3, y3); ctx.lineTo(x1, -y1); ctx.stroke();
      ctx.globalAlpha = 1; glow(c2, 12); ctx.fillStyle = c2;
      ctx.beginPath(); ctx.arc(x3, y3, 2, 0, 6.29); ctx.fill();
    });
  } else if (fx === 'glitch') {
    mirrored(() => {
      const c = col(off); glow(c, 10);
      ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x1, y1);
      let gx = x1, gy = y1;
      for (let q = 0; q < 4; q++) {
        gx += (x2 - x1) / 4 + (Math.random() - 0.5) * 18;
        gy += (y2 - y1) / 4 + (Math.random() - 0.5) * 18;
        ctx.lineTo(gx, gy);
      }
      ctx.stroke();
      if (Math.random() < 0.3) {
        const c2 = col(off + 180); glow(c2, 14); ctx.fillStyle = c2;
        ctx.fillRect(x3 - 8, y3 - 1.5, 16 + Math.random() * 20, 3);
      }
    });
  } else if (fx === 'laser') {
    mirrored(() => {
      const c = col(off);
      ctx.globalAlpha = 0.25; ctx.shadowBlur = 0;
      ctx.strokeStyle = c; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x2 * 3.5, y2 * 3.5); ctx.lineTo(0, 0); ctx.stroke();
      ctx.globalAlpha = 1;
      glow(c, 18); ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const c2 = col(off + 120); glow(c2, 20); ctx.fillStyle = c2;
      ctx.beginPath(); ctx.arc(x2, y2, 2.5, 0, 6.29); ctx.fill();
    });
  } else if (fx === 'stars') {
    mirrored(() => {
      const c = col(off); glow(c, 12);
      ctx.strokeStyle = c; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
      const r = 8 + 6 * Math.abs(Math.sin(t * 1.3));
      ctx.beginPath();
      for (let p = 0; p < 10; p++) {
        const rr = p % 2 ? r * 0.45 : r;
        const aa = t * 0.8 + p * Math.PI / 5;
        const px = x2 + Math.cos(aa) * rr, py = y2 + Math.sin(aa) * rr;
        p ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
      const c2 = col(off + 90); glow(c2, 8); ctx.fillStyle = c2;
      ctx.beginPath(); ctx.arc(x1, y1, 2, 0, 6.29); ctx.fill();
    });
  } else if (fx === 'waves') {
    mirrored(() => {
      const R = Math.hypot(x2, y2) || 1;
      const ang = Math.atan2(y2, x2);
      const c = col(off); glow(c, 12);
      ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(0, 0, R, ang - 0.55, ang + 0.55); ctx.stroke();
      const c2 = col(off + 100); glow(c2, 8);
      ctx.strokeStyle = c2; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, R * 0.62, ang - 0.35, ang + 0.35); ctx.stroke();
      const c3 = col(off + 200);
      glow(c3, 10); ctx.fillStyle = c3;
      ctx.beginPath(); ctx.arc(x2, y2, 2, 0, 6.29); ctx.fill();
    });
  } else if (fx === 'petals') {
    mirrored(() => {
      const c = col(off);
      ctx.shadowBlur = 0; ctx.globalAlpha = 0.28; ctx.fillStyle = c;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(x1 * 1.6, y1 * 0.3, x2, y2);
      ctx.quadraticCurveTo(x1 * 0.3, y1 * 1.6, 0, 0);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;
      const c2 = col(off + 60); glow(c2, 10);
      ctx.strokeStyle = c2; ctx.lineWidth = 1.2; ctx.stroke();
    });
  }
  ctx.shadowBlur = 0;
}

function autonomousFigure(s) {
  a1 += (Math.sin(t * 0.31) * 0.09 + Math.cos(t * 0.17) * 0.07) * s;
  a2 += (Math.cos(t * 0.23) * 0.11 + Math.sin(t * 0.13) * 0.05) * s;
  a3 += Math.sin(t * 0.41) * 0.06 * s;
  const r1 = 55 + 85 * Math.sin(t * 0.19) + 45 * Math.cos(t * 0.07);
  const r2 = 35 + 65 * Math.cos(t * 0.29) + 35 * Math.sin(t * 0.11);
  const x1 = Math.cos(a1) * r1, y1 = Math.sin(a1) * r1;
  const x2 = x1 + Math.cos(a2) * r2, y2 = y1 + Math.sin(a2) * r2;
  return { x1, y1, x2, y2, x3: x2 + Math.cos(a3) * r2 * 0.7, y3: y2 + Math.sin(a3) * r2 * 0.7 };
}

function touchFigure(tc) {
  const sc = SC() * gScale;
  const rx = (tc.x - cx), ry = (tc.y - cy);
  const cos = Math.cos(-gRot), sin = Math.sin(-gRot);
  const tx = (rx * cos - ry * sin) / sc, ty = (rx * sin + ry * cos) / sc;
  tc.a3 += 0.15;
  return {
    x1: tx * 0.5, y1: ty * 0.5,
    x2: tx, y2: ty,
    x3: tx + Math.cos(tc.a3) * 40, y3: ty + Math.sin(tc.a3) * 40
  };
}

function step() {
  const s = speed * 0.2;
  t += 0.022 * s;
  hue = (hue + 1.3 * s) % 360;
  if (touches.size > 0) {
    let i = 0;
    for (const tc of touches.values()) {
      renderFigure(touchFigure(tc), i * 47);
      i++;
    }
  } else {
    renderFigure(autonomousFigure(s), 0);
  }
}

function frame() {
  if (!paused) {
    if (autoDJ && ++autoTimer > 480) {
      autoTimer = 0;
      const opts = fxList.filter(f => f !== fx);
      fx = opts[Math.floor(Math.random() * opts.length)];
      syncFxChips();
    }
    ctx.fillStyle = 'rgba(5,5,16,' + fade + ')';
    ctx.fillRect(0, 0, W, H);
    for (let k = 0; k < 3; k++) step();
  }
  requestAnimationFrame(frame);
}

function clearCv() {
  ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, W, H);
  a1 = Math.random() * 6.28; a2 = Math.random() * 6.28; a3 = Math.random() * 6.28;
}

const hint = document.getElementById('hint');
const fingersEl = document.getElementById('fingers');
function hideHint() { hint.style.opacity = '0'; }
setTimeout(hideHint, 9000);

function updFingers() {
  const n = touches.size;
  fingersEl.style.opacity = n > 1 ? '1' : '0';
  if (n === 2) fingersEl.textContent = '2 DEDOS · GIRO + ZOOM';
  else if (n >= 3) fingersEl.textContent = n + ' PINCÉIS ATIVOS';
}

function gestureState() {
  const arr = [...touches.values()];
  if (arr.length < 2) return null;
  const dx = arr[1].x - arr[0].x, dy = arr[1].y - arr[0].y;
  return { ang: Math.atan2(dy, dx), dist: Math.hypot(dx, dy) || 1 };
}

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  hideHint();
  document.getElementById('sheet').classList.remove('open');
  for (const p of e.changedTouches) {
    touches.set(p.identifier, { x: p.clientX * dpr, y: p.clientY * dpr, a3: Math.random() * 6.28 });
  }
  if (touches.size === 1) {
    const now = Date.now();
    if (now - lastTap < 320) { clearCv(); lastTap = 0; }
    else lastTap = now;
  }
  gesture = gestureState();
  updFingers();
}, { passive: false });

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const p of e.changedTouches) {
    const tc = touches.get(p.identifier);
    if (tc) { tc.x = p.clientX * dpr; tc.y = p.clientY * dpr; }
  }
  const g = gestureState();
  if (g && gesture) {
    let dA = g.ang - gesture.ang;
    if (dA > Math.PI) dA -= 6.283; else if (dA < -Math.PI) dA += 6.283;
    gRot += dA;
    gScale = Math.max(0.35, Math.min(3, gScale * (g.dist / gesture.dist)));
  }
  gesture = g;
}, { passive: false });

function endTouch(e) {
  for (const p of e.changedTouches) touches.delete(p.identifier);
  gesture = gestureState();
  updFingers();
}
cv.addEventListener('touchend', endTouch);
cv.addEventListener('touchcancel', endTouch);

let mouseDown = false;
cv.addEventListener('mousedown', e => {
  if (e.target !== cv) return;
  const now = Date.now();
  if (now - lastTap < 320) { clearCv(); lastTap = 0; return; }
  lastTap = now;
  mouseDown = true;
  touches.set('m', { x: e.clientX * dpr, y: e.clientY * dpr, a3: 0 });
  hideHint();
  document.getElementById('sheet').classList.remove('open');
});
cv.addEventListener('mousemove', e => {
  if (mouseDown) {
    const tc = touches.get('m');
    if (tc) { tc.x = e.clientX * dpr; tc.y = e.clientY * dpr; }
  }
});
function mouseUp() { mouseDown = false; touches.delete('m'); }
cv.addEventListener('mouseup', mouseUp);
cv.addEventListener('mouseleave', mouseUp);
cv.addEventListener('wheel', e => {
  e.preventDefault();
  gScale = Math.max(0.35, Math.min(3, gScale * (e.deltaY < 0 ? 1.06 : 0.94)));
}, { passive: false });

const sheet = document.getElementById('sheet');
document.getElementById('grab').addEventListener('click', () => {
  sheet.classList.toggle('open');
  hideHint();
});

function syncFxChips() {
  document.querySelectorAll('#rowFx .chip').forEach(c => {
    c.classList.toggle('on', c.dataset.fx === fx || (c.dataset.fx === 'auto' && autoDJ));
  });
}
document.getElementById('rowFx').addEventListener('click', e => {
  const b = e.target.closest('[data-fx]'); if (!b) return;
  if (b.dataset.fx === 'auto') { autoDJ = !autoDJ; autoTimer = 0; }
  else { fx = b.dataset.fx; autoDJ = false; }
  syncFxChips();
});
document.getElementById('rowPal').addEventListener('click', e => {
  const b = e.target.closest('[data-pal]'); if (!b) return;
  pal = b.dataset.pal;
  document.querySelectorAll('#rowPal .chip').forEach(c => c.classList.remove('on'));
  b.classList.add('on');
});
document.getElementById('seg').addEventListener('input', function () {
  segments = parseInt(this.value);
  document.getElementById('segOut').textContent = segments;
});
document.getElementById('tr').addEventListener('input', function () {
  fade = 0.16 - parseInt(this.value) * 0.0145;
});
document.getElementById('spd').addEventListener('input', function () {
  speed = parseInt(this.value);
});
document.getElementById('rtx').addEventListener('click', function () {
  rtxOn = !rtxOn;
  this.textContent = rtxOn ? 'RTX ON' : 'RTX OFF';
  this.classList.toggle('dim', !rtxOn);
});
document.getElementById('pp').addEventListener('click', function () {
  paused = !paused;
  this.innerHTML = paused ? '&#9654;' : '&#10074;&#10074;';
});
document.getElementById('fs').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || function(){}).call(document.documentElement);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
  }
});

frame();
</script>
</body>
</html>
