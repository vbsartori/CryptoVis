<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Galaxy — Cryptocurrency Solar System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #04040a;
    --bg-surface: rgba(14, 14, 24, 0.72);
    --border-faint: rgba(255, 255, 255, 0.08);
    --border-soft: rgba(255, 255, 255, 0.14);
    --text-primary: #f4f1e8;
    --text-secondary: rgba(244, 241, 232, 0.62);
    --text-muted: rgba(244, 241, 232, 0.38);
    --gold: #f7931a;
    --gold-warm: #ffb84d;
    --gold-soft: #ffd86b;
    --green: #4ade80;
    --red: #f87171;
    --font-display: 'Cinzel', Georgia, serif;
    --font-body: 'Outfit', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    cursor: grab;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body:active { cursor: grabbing; }
  body.hovering { cursor: pointer; }

  canvas { display: block; outline: none; }

  /* ─── Loading Screen ─── */
  #loading {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #0a0814 0%, #000 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 1.2s cubic-bezier(.4,0,.2,1);
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 500;
    letter-spacing: 0.4em;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold), #ff6b00);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    text-transform: uppercase;
    animation: pulseLogo 2.4s ease-in-out infinite;
  }
  
  .loading-sub {
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  @keyframes pulseLogo {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(247,147,26,.3)); }
    50%      { filter: drop-shadow(0 0 30px rgba(247,147,26,.6)); }
  }

  .orbit-loader {
    position: relative;
    width: 70px;
    height: 70px;
  }
  .orbit-loader::before, .orbit-loader::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
    border-top-color: var(--gold);
    animation: spin 1.6s linear infinite;
  }
  .orbit-loader::before {
    inset: 0;
    border-top-color: var(--gold);
  }
  .orbit-loader::after {
    inset: 14px;
    border-top-color: var(--gold-soft);
    animation-duration: 1.1s;
    animation-direction: reverse;
  }
  .orbit-loader-core {
    position: absolute;
    top: 50%; left: 50%;
    width: 8px; height: 8px;
    transform: translate(-50%, -50%);
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 18px var(--gold);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Header (top-left) ─── */
  #header {
    position: fixed;
    top: 28px; left: 32px;
    z-index: 100;
    user-select: none;
    pointer-events: none;
  }
  .title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff8e0 10%, var(--gold-soft) 50%, var(--gold) 90%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 10px;
    letter-spacing: 0.45em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }
  .ornament {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin-top: 10px;
  }

  /* ─── Controls (top-right) ─── */
  #controls {
    position: fixed;
    top: 28px; right: 32px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  
  .toggle-group {
    display: flex;
    background: var(--bg-surface);
    border: 1px solid var(--border-faint);
    border-radius: 100px;
    padding: 4px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  
  .btn {
    background: transparent;
    color: var(--text-secondary);
    border: none;
    padding: 9px 22px;
    border-radius: 100px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .35s cubic-bezier(.4,0,.2,1);
  }
  .btn:hover { color: var(--text-primary); }
  .btn.active {
    background: linear-gradient(135deg, var(--gold) 0%, #ff6b00 100%);
    color: #0a0810;
    box-shadow: 0 0 20px rgba(247,147,26,.35), inset 0 1px 0 rgba(255,255,255,.25);
  }

  .icon-btn {
    width: 40px; height: 40px;
    background: var(--bg-surface);
    border: 1px solid var(--border-faint);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all .25s ease;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .icon-btn:hover {
    color: var(--gold);
    border-color: rgba(247,147,26,.4);
    transform: rotate(8deg);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ─── Stars/Comets Toggle (discrete pill) ─── */
  .stars-toggle {
    background: var(--bg-surface);
    border: 1px solid var(--border-faint);
    border-radius: 100px;
    padding: 8px 14px 8px 12px;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    transition: all .25s ease;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    user-select: none;
  }
  .stars-toggle:hover {
    color: var(--text-primary);
    border-color: var(--border-soft);
  }
  .stars-toggle .star-icon {
    width: 10px; height: 10px;
    color: var(--gold-soft);
    transition: opacity .25s ease, transform .4s cubic-bezier(.4,0,.2,1);
  }
  .stars-toggle.off .star-icon {
    opacity: 0.25;
    transform: rotate(-30deg) scale(0.85);
  }
  .stars-toggle.off { opacity: 0.7; }

  /* ─── Status Bar (bottom-left) ─── */
  #status {
    position: fixed;
    bottom: 26px; left: 32px;
    z-index: 100;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
    user-select: none;
    pointer-events: none;
  }
  .status-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.error { background: var(--red); box-shadow: 0 0 10px var(--red); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ─── Legend (bottom-right) ─── */
  #legend {
    position: fixed;
    bottom: 26px; right: 32px;
    z-index: 100;
    background: var(--bg-surface);
    border: 1px solid var(--border-faint);
    border-radius: 14px;
    padding: 14px 18px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    user-select: none;
    pointer-events: none;
    max-width: 240px;
  }
  .legend-title {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .legend-line {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.7;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend-line .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .legend-line .dot.gold   { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .legend-line .dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .legend-line .dot.red    { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* ─── Tooltip ─── */
  #tooltip {
    position: fixed;
    background: rgba(8, 6, 16, 0.94);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 16px 18px;
    min-width: 260px;
    max-width: 300px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .18s ease, transform .18s ease;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    box-shadow:
      0 24px 50px rgba(0,0,0,.55),
      0 0 0 1px rgba(247,147,26,.04),
      inset 0 1px 0 rgba(255,255,255,.06);
    z-index: 200;
  }
  #tooltip.visible { opacity: 1; transform: translateY(0); }

  #tooltip::before {
    content: '';
    position: absolute;
    top: 0; left: 18px; right: 18px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
  }

  .tt-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-faint);
  }
  .tt-icon-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .tt-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    object-fit: contain;
    padding: 2px;
  }
  .tt-rank {
    position: absolute;
    bottom: -3px; right: -3px;
    background: var(--gold);
    color: #0a0810;
    font-size: 9px;
    font-weight: 700;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #0a0810;
  }
  .tt-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.06em;
    line-height: 1.1;
  }
  .tt-symbol {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .tt-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
  }
  .tt-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }
  .tt-value {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    text-align: right;
  }
  .tt-value.green { color: var(--green); }
  .tt-value.red   { color: var(--red); }
  .tt-direction {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-faint);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }
  .tt-direction strong {
    color: var(--gold-soft);
    font-weight: 600;
  }

  /* ─── Reload Notification ─── */
  #notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: rgba(8, 6, 16, 0.95);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 14px 24px;
    z-index: 300;
    backdrop-filter: blur(20px);
    opacity: 0;
    pointer-events: none;
    transition: all .4s cubic-bezier(.4,0,.2,1);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-soft);
    box-shadow: 0 0 30px rgba(247,147,26,.3);
  }
  #notification.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ─── Vignette overlay ─── */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
  }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    #header { top: 14px; left: 16px; }
    .title { font-size: 16px; letter-spacing: 0.24em; }
    .subtitle { font-size: 8px; letter-spacing: 0.34em; }
    .ornament { width: 42px; margin-top: 8px; }

    /* Controls dock to the bottom, centered, wrapping into tidy rows */
    #controls {
      top: auto;
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: max-content;
      max-width: calc(100vw - 24px);
    }
    .toggle-group { padding: 3px; }
    .btn {
      padding: 9px 15px;
      font-size: 10px;
      letter-spacing: 0.14em;
    }
    /* bigger, finger-friendly icon buttons; cancel hover-rotate on touch */
    .icon-btn { width: 42px; height: 42px; }
    .icon-btn:hover { transform: none; }
    .icon-btn svg { width: 18px; height: 18px; }
    .stars-toggle {
      order: 3;
      padding: 10px 14px;
      font-size: 9px;
    }
    .stars-toggle .star-icon { width: 12px; height: 12px; }

    /* status sits top-right, out of the way of the bottom dock */
    #status {
      top: 16px; right: 16px;
      bottom: auto; left: auto;
      text-align: right;
      font-size: 9px;
    }
    .status-row { justify-content: flex-end; }
    #legend { display: none; }

    /* tooltip fills most of the width and floats near the top */
    #tooltip {
      min-width: 0;
      width: calc(100vw - 28px);
      max-width: 340px;
      padding: 14px 16px;
    }
  }

  /* Short / landscape phones: keep header from crowding controls */
  @media (max-width: 768px) and (max-height: 480px) {
    #status { display: none; }
    .subtitle, .ornament { display: none; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loading-logo">CRYPTO·GALAXY</div>
  <div class="loading-sub">Aligning the cosmos</div>
  <div class="orbit-loader">
    <div class="orbit-loader-core"></div>
  </div>
</div>

<!-- Header -->
<div id="header">
  <div class="title">Crypto Galaxy</div>
  <div class="subtitle">Cryptocurrency Solar System</div>
  <div class="ornament"></div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="stars-toggle" id="btnStars" title="Toggle stars and comets">
    <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/>
    </svg>
    <span id="starsLabel">Stars On</span>
  </button>
  <div class="toggle-group">
    <button class="btn active" id="btn1D">1D</button>
    <button class="btn" id="btn7D">7D</button>
    <button class="btn" id="btn30D">30D</button>
  </div>
  <div class="toggle-group">
    <button class="btn" id="btn25">Top 25</button>
    <button class="btn active" id="btn50">Top 50</button>
  </div>
  <a class="icon-btn" id="btnHome" href="../index.html" title="Back to Crypto Lab" aria-label="Back to Crypto Lab home" style="text-decoration:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.6 12 3l9 7.6"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
  </a>
  <button class="icon-btn" id="btnRefresh" title="Refresh now">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M3 22v-6h6"/>
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 2v6h-6"/>
    </svg>
  </button>
</div>

<!-- Status -->
<div id="status">
  <div>Last update: <span id="lastUpdate">—</span></div>
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected · CoinGecko API</span>
  </div>
</div>

<!-- Legend -->
<div id="legend">
  <div class="legend-title">System Legend</div>
  <div class="legend-line"><span class="dot gold"></span>Size ∝ Market Cap</div>
  <div class="legend-line"><span class="dot green"></span>Clockwise orbit · <span id="legendUp">24h ↑</span></div>
  <div class="legend-line"><span class="dot red"></span>Counter-clockwise orbit · <span id="legendDown">24h ↓</span></div>
  <div class="legend-line" style="margin-top:6px; color: var(--text-muted); font-size:10px;">Speed ∝ |% <span id="legendAbs">24h</span>|</div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Notification -->
<div id="notification">Data updated</div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════════════
   CRYPTO GALAXY — Cryptocurrency Solar System
   ════════════════════════════════════════════════════════════════ */

// ─────────────── Config ───────────────
const REFRESH_MS = 5 * 60 * 1000;
const SUN_RADIUS = 9;
const ORBIT_BASE = 22;
const ORBIT_STEP = 4.6;
const PLANET_MIN = 0.5;
const PLANET_MAX = 3.4;

// ─────────────── State ───────────────
let scene, camera, renderer, controls;
let sun = null;
let planets = [];
let starField = null;
let nebulae = [];
let cometSystem = null;
let ambienceOn = true;
let raycaster, pointer;
let hovered = null;
let currentLimit = 50;
let currentPeriod = '24h';   // '24h' | '7d' | '30d'  — selectable via UI
let coinsData = [];
let lastFetchOK = true;
let refreshTimer = null;
let isFetching = false;
let clock;

// ─────────────── Init ───────────────
function init() {
  clock = new THREE.Clock();
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.FogExp2(0x000000, 0.0008);

  camera = new THREE.PerspectiveCamera(
    55, window.innerWidth / window.innerHeight, 0.1, 5000
  );
  camera.position.set(0, 65, 165);
  applyResponsiveCamera();

  renderer = new THREE.WebGLRenderer({ 
    antialias: true, 
    alpha: false,
    powerPreference: 'high-performance'
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.body.appendChild(renderer.domElement);

  controls = new SimpleOrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.minDistance = 25;
  controls.maxDistance = 400;
  // On phones / portrait, start further out and allow pulling back more so
  // the outer orbits stay reachable on a small, narrow screen.
  if (isNarrowViewport()) {
    controls.maxDistance = 620;
    controls.radius = 250;
  }
  controls.update();

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2(-10, -10);

  // Ambient atmospheric light (cool nebula tint)
  scene.add(new THREE.AmbientLight(0x202238, 0.45));

  // Sun-emitted point light
  const sunLight = new THREE.PointLight(0xffd2a0, 3.5, 600, 1.4);
  sunLight.position.set(0, 0, 0);
  scene.add(sunLight);

  // Distant rim light
  const rim = new THREE.DirectionalLight(0x6b7fc5, 0.3);
  rim.position.set(-200, 100, -150);
  scene.add(rim);

  buildStarfield();
  buildNebulae();
  cometSystem = new CometSystem(scene);

  // Events
  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onPointerMove);
  renderer.domElement.addEventListener('mouseleave', () => {
    hovered = null;
    hideTooltip();
  });
  renderer.domElement.addEventListener('touchstart', onTouchTap);

  document.getElementById('btn25').addEventListener('click', () => switchLimit(25));
  document.getElementById('btn50').addEventListener('click', () => switchLimit(50));
  document.getElementById('btn1D').addEventListener('click',  () => switchPeriod('24h'));
  document.getElementById('btn7D').addEventListener('click',  () => switchPeriod('7d'));
  document.getElementById('btn30D').addEventListener('click', () => switchPeriod('30d'));
  document.getElementById('btnRefresh').addEventListener('click', () => {
    if (!isFetching) loadData(true);
  });
  document.getElementById('btnStars').addEventListener('click', toggleAmbience);

  // First fetch + animation loop
  loadData(false);
  animate();
}

// ─────────────── Starfield ───────────────
function buildStarfield() {
  const geom = new THREE.BufferGeometry();
  const pos = [], col = [], siz = [], phase = [];
  const count = 9000;
  for (let i = 0; i < count; i++) {
    const r = 600 + Math.random() * 1800;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
    // Star colors: subtle blue/gold/white tints
    const tint = Math.random();
    if (tint < 0.7) {
      const c = 0.75 + Math.random() * 0.25;
      col.push(c, c, c);
    } else if (tint < 0.88) {
      col.push(0.8, 0.88, 1.0);   // bluish
    } else {
      col.push(1.0, 0.9, 0.7);    // golden
    }
    // 5% are bright "hero" stars; the rest are common pinpoints. Sizes
    // chosen so common stars resolve to 2–4 visible pixels at typical
    // viewing distances and hero stars become clear bright accents.
    siz.push(Math.random() < 0.05 ? (4.5 + Math.random() * 3) : (1.5 + Math.random() * 1.5));
    phase.push(Math.random());
  }
  geom.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geom.setAttribute('color',    new THREE.Float32BufferAttribute(col, 3));
  geom.setAttribute('size',     new THREE.Float32BufferAttribute(siz, 1));
  geom.setAttribute('phase',    new THREE.Float32BufferAttribute(phase, 1));

  // Custom shader with per-star twinkle. NOTE: when using a raw
  // vertexShader string (not the chunk system), three.js does NOT
  // auto-inject the standard `color` attribute even with vertexColors:true,
  // so we declare it explicitly here.
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      time:         { value: 0 },
      pointTexture: { value: makeStarTexture() },
    },
    vertexShader: `
      attribute vec3  color;
      attribute float size;
      attribute float phase;
      varying vec3  vColor;
      varying float vTwinkle;
      uniform float time;
      void main() {
        vColor = color;
        // Two overlapping sines at different frequencies → irregular shimmer
        float t1 = sin(time * 2.4 + phase * 6.2831);
        float t2 = sin(time * 1.1 + phase * 12.566);
        vTwinkle = 0.72 + 0.22 * t1 + 0.12 * t2;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        // 4× multiplier × distance attenuation — tuned so common stars
        // resolve clearly without bloating into the camera as you zoom in.
        gl_PointSize = size * 4.0 * (350.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      uniform sampler2D pointTexture;
      varying vec3  vColor;
      varying float vTwinkle;
      void main() {
        vec4 tex = texture2D(pointTexture, gl_PointCoord);
        // Cut the soft halo so points stay tight and never bleed into a
        // screen-wide haze with 9000 of them stacked under additive blend.
        if (tex.a < 0.08) discard;
        gl_FragColor = vec4(vColor * vTwinkle, 1.0) * tex;
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  starField = new THREE.Points(geom, mat);
  scene.add(starField);
}

function makeStarTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.25, 'rgba(255,255,255,0.6)');
  g.addColorStop(0.5,  'rgba(255,255,255,0.15)');
  g.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 64, 64);
  const t = new THREE.CanvasTexture(c);
  return t;
}

// ─────────────── Nebulae (atmospheric depth) ───────────────
function buildNebulae() {
  const colors = [
    { color: 0x3a2a8a, scale: 700, opacity: 0.13, pos: [-400, 80, -350] },
    { color: 0x8a3a4a, scale: 650, opacity: 0.10, pos: [350, -60, -400] },
    { color: 0x2a4a8a, scale: 800, opacity: 0.09, pos: [100, 200, -600] },
    { color: 0x6a3a8a, scale: 550, opacity: 0.08, pos: [-300, -150, 200] },
  ];
  const tex = makeStarTexture();
  colors.forEach(n => {

// ─────────────── Comets (cinematic ribbon-trail) ───────────────
// Spawns rare comets at random intervals. Each comet has a glowing head
// sprite + a ribbon-trail mesh whose width tapers from front to back. The
// ribbon's perpendicular axis is recomputed each frame as cross(motion,
// toCamera), so the strip always faces the viewer regardless of orbit.
class RibbonTrail {
  constructor(segments, headColor, baseWidth) {
    this.N = segments;
    this.baseWidth = baseWidth;
    this.history = [];

    // 2 vertices per segment (left/right of strip)
    this.posArr = new Float32Array(this.N * 2 * 3);
    this.colArr = new Float32Array(this.N * 2 * 3);

    // Triangles connecting segment i to segment i+1
    const indices = [];
    for (let i = 0; i < this.N - 1; i++) {
      const a = i * 2, b = i * 2 + 1;
      const c = (i + 1) * 2, d = (i + 1) * 2 + 1;
      indices.push(a, c, b, b, c, d);
    }

    // Color gradient: bright head color at front, fading to black at tail.
    // (Additive blending makes "black" effectively transparent.)
    const r0 = ((headColor >> 16) & 255) / 255;
    const g0 = ((headColor >>  8) & 255) / 255;
    const b0 = ( headColor        & 255) / 255;
    for (let i = 0; i < this.N; i++) {
      const t = 1 - i / (this.N - 1);   // 1 at head → 0 at tail
      const fade = t * t;               // quadratic for that "comet streak" feel
      const r = r0 * fade, g = g0 * fade, b = b0 * fade;
      const i0 = (i * 2) * 3, i1 = (i * 2 + 1) * 3;
      this.colArr[i0] = r; this.colArr[i0 + 1] = g; this.colArr[i0 + 2] = b;
      this.colArr[i1] = r; this.colArr[i1 + 1] = g; this.colArr[i1 + 2] = b;
    }

    this.geom = new THREE.BufferGeometry();
    this.geom.setAttribute('position', new THREE.BufferAttribute(this.posArr, 3));
    this.geom.setAttribute('color',    new THREE.BufferAttribute(this.colArr, 3));
    this.geom.setIndex(indices);

    this.mat = new THREE.MeshBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 1.0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    this.mesh = new THREE.Mesh(this.geom, this.mat);
    this.mesh.frustumCulled = false;
    this.mesh.renderOrder = 4;
  }

  update(headPos, camera) {
    // Push newest head position to front
    this.history.unshift(headPos.clone());
    if (this.history.length > this.N) this.history.length = this.N;
    while (this.history.length < this.N) {
      this.history.push(this.history[this.history.length - 1].clone());
    }

    const _dir  = new THREE.Vector3();
    const _cam  = new THREE.Vector3();
    const _side = new THREE.Vector3();

    for (let i = 0; i < this.N; i++) {
      const p = this.history[i];
      // Direction along the strip (point to next-back point)
      const ref = i < this.N - 1 ? this.history[i + 1] : this.history[i - 1] || p;
      _dir.subVectors(p, ref).normalize();
      _cam.subVectors(camera.position, p).normalize();
      _side.crossVectors(_dir, _cam).normalize();

      // Width tapers from full at the head to ~0 at the tail
      const t = i / (this.N - 1);
      const width = this.baseWidth * (1 - t) * (1 - t * 0.6);

      const sx = _side.x * width, sy = _side.y * width, sz = _side.z * width;
      const i0 = (i * 2) * 3, i1 = (i * 2 + 1) * 3;
      this.posArr[i0]     = p.x + sx;
      this.posArr[i0 + 1] = p.y + sy;
      this.posArr[i0 + 2] = p.z + sz;
      this.posArr[i1]     = p.x - sx;
      this.posArr[i1 + 1] = p.y - sy;
      this.posArr[i1 + 2] = p.z - sz;
    }
    this.geom.attributes.position.needsUpdate = true;
  }

  setOpacity(o) { this.mat.opacity = o; }

  dispose() { this.geom.dispose(); this.mat.dispose(); }
}

class Comet {
  constructor(headTexture) {
    // Spawn from a random point on a far sphere; aim toward roughly the
    // opposite side, with offset, so the path passes near the action.
    const startAngle = Math.random() * Math.PI * 2;
    const startDist  = 380;
    const startY     = -90 + Math.random() * 180;
    this.position = new THREE.Vector3(
      Math.cos(startAngle) * startDist,
      startY,
      Math.sin(startAngle) * startDist
    );
    const targetAngle = startAngle + Math.PI + (Math.random() - 0.5) * 0.7;
    const target = new THREE.Vector3(
      Math.cos(targetAngle) * startDist,
      -90 + Math.random() * 180,
      Math.sin(targetAngle) * startDist
    );
    this.velocity = new THREE.Vector3()
      .subVectors(target, this.position)
      .normalize()
      .multiplyScalar(70 + Math.random() * 50);

    // Cool blue / warm gold / icy white — pick one
    const palette = [0xc8e0ff, 0xfff0c8, 0xffffff, 0xb8d8ff, 0xffe8a0];
    const headColor = palette[Math.floor(Math.random() * palette.length)];

    // Head: glowing sprite
    this.head = new THREE.Sprite(new THREE.SpriteMaterial({
      map: headTexture,
      color: headColor,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    }));
    const headSize = 5 + Math.random() * 4;
    this.head.scale.set(headSize, headSize, 1);
    this.head.position.copy(this.position);
    this.head.renderOrder = 5;

    // Trail
    this.trail = new RibbonTrail(50, headColor, 1.6 + Math.random() * 1.2);
    // Pre-fill history so the trail is fully formed when the comet appears
    for (let i = 0; i < 50; i++) {
      this.trail.history.push(
        this.position.clone().sub(
          this.velocity.clone().multiplyScalar(0.04 * i)
        )
      );
    }

    // Lifetime: long enough to traverse the scene
    this.life     = 0;
    this.maxLife  = (startDist * 2) / this.velocity.length() + 0.5;
    this.fadeIn   = 0.4;
    this.fadeOut  = 0.8;
    this.headBaseSize = headSize;
  }

  addTo(scene) { scene.add(this.head); scene.add(this.trail.mesh); }

  update(dt, camera) {
    this.life += dt;
    this.position.addScaledVector(this.velocity, dt);
    this.head.position.copy(this.position);
    this.trail.update(this.position, camera);

    // Fade in from 0, hold at 1, fade out at end
    let opacity = 1;
    if (this.life < this.fadeIn) {
      opacity = this.life / this.fadeIn;
    } else if (this.life > this.maxLife - this.fadeOut) {
      opacity = Math.max(0, (this.maxLife - this.life) / this.fadeOut);
    }
    this.head.material.opacity = opacity;
    this.trail.setOpacity(opacity * 0.95);

    // Head pulse — subtle scale breathing
    const pulse = 1 + Math.sin(this.life * 8) * 0.06;
    this.head.scale.set(this.headBaseSize * pulse, this.headBaseSize * pulse, 1);

    return this.life < this.maxLife;
  }

  dispose(scene) {
    scene.remove(this.head);
    scene.remove(this.trail.mesh);
    this.head.material.dispose();
    this.trail.dispose();
  }
}

class CometSystem {
  constructor(scene) {
    this.scene = scene;
    this.comets = [];
    this.headTex = makeRadialGlow();
    this.enabled = true;
    this.nextSpawnIn = 3 + Math.random() * 4;   // first comet in 3-7s
  }

  update(dt, _t) {
    if (!this.enabled) return;
    this.nextSpawnIn -= dt;
    if (this.nextSpawnIn <= 0) {
      this.spawn();
      // 8–22s between comets (cinematic rarity, never feels constant)
      this.nextSpawnIn = 8 + Math.random() * 14;
    }
    for (let i = this.comets.length - 1; i >= 0; i--) {
      const alive = this.comets[i].update(dt, camera);
      if (!alive) {
        this.comets[i].dispose(this.scene);
        this.comets.splice(i, 1);
      }
    }
  }

  spawn() {
    const c = new Comet(this.headTex);
    c.addTo(this.scene);
    this.comets.push(c);
  }

  setEnabled(on) {
    this.enabled = on;
    if (!on) {
      this.comets.forEach(c => c.dispose(this.scene));
      this.comets = [];
    } else {
      // Stagger first re-spawn so it doesn't appear instantly
      this.nextSpawnIn = 4 + Math.random() * 6;
    }
  }
}

// ─────────────── Sun (Bitcoin) ───────────────
function buildSun(coin) {
  const group = new THREE.Group();

  // Procedural sun surface
  const tex = makeSunTexture();
  const surface = new THREE.Mesh(
    new THREE.SphereGeometry(SUN_RADIUS, 96, 96),
    new THREE.MeshBasicMaterial({ map: tex })
  );
  group.add(surface);

  // Inner glow halo
  const glowTex = makeRadialGlow();
  const inner = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex,
    color: 0xffd28a,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  }));
  inner.scale.set(SUN_RADIUS * 3.6, SUN_RADIUS * 3.6, 1);
  group.add(inner);

  // Outer corona
  const outer = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex,
    color: 0xff9933,
    transparent: true,
    opacity: 0.55,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  }));
  outer.scale.set(SUN_RADIUS * 7.5, SUN_RADIUS * 7.5, 1);
  group.add(outer);

  // Far corona
  const far = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex,
    color: 0xff5500,
    transparent: true,
    opacity: 0.20,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  }));
  far.scale.set(SUN_RADIUS * 13, SUN_RADIUS * 13, 1);
  group.add(far);

  // Floating BTC icon (Sims-plumbob style — hovers above the sun)
  const iconSprite = makeFloatingIconSprite(coin.image, true);
  const iconSize = 5.2;
  iconSprite.scale.set(iconSize, iconSize, 1);
  const iconBaseY = SUN_RADIUS + iconSize * 0.7;
  iconSprite.position.set(0, iconBaseY, 0);
  group.add(iconSprite);

  // Price label well above the icon, always rendered on top
  const priceLabel = makePriceLabel(coin, true);
  priceLabel.position.set(0, iconBaseY + iconSize * 0.7 + 2, 0);
  group.add(priceLabel);

  scene.add(group);

  sun = {
    group, surface, inner, outer, far, iconSprite, priceLabel,
    iconBaseY,
    coin, isSun: true,
    mesh: surface, // for raycasting
  };
}

function makeSunTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 1024;
  const ctx = c.getContext('2d');
  // Base radial
  const g = ctx.createRadialGradient(512, 512, 80, 512, 512, 512);
  g.addColorStop(0,    '#fffaf0');
  g.addColorStop(0.25, '#ffe7a0');
  g.addColorStop(0.55, '#ffaa3c');
  g.addColorStop(0.85, '#e36b14');
  g.addColorStop(1,    '#9c3e00');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 1024, 1024);
  // Granulation
  for (let i = 0; i < 4500; i++) {
    const x = Math.random() * 1024;
    const y = Math.random() * 1024;
    const r = 1.5 + Math.random() * 5;
    const a = Math.random() * 0.4;
    const isBright = Math.random() < 0.55;
    ctx.fillStyle = isBright
      ? `rgba(255, ${200 + Math.random()*55|0}, ${120 + Math.random()*100|0}, ${a})`
      : `rgba(120, ${30 + Math.random()*60|0}, 0, ${a*0.8})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  // Solar flares streaks
  for (let i = 0; i < 30; i++) {
    const x = Math.random() * 1024;
    const y = Math.random() * 1024;
    const len = 30 + Math.random() * 70;
    const ang = Math.random() * Math.PI * 2;
    const grad = ctx.createLinearGradient(x, y, x + Math.cos(ang)*len, y + Math.sin(ang)*len);
    grad.addColorStop(0, 'rgba(255,230,150,0.4)');
    grad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2 + Math.random() * 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(ang)*len, y + Math.sin(ang)*len);
    ctx.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function makeRadialGlow() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.15, 'rgba(255,235,180,0.85)');
  g.addColorStop(0.35, 'rgba(255,170,80,0.4)');
  g.addColorStop(0.65, 'rgba(255,90,0,0.12)');
  g.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(c);
}

// ─────────────── Planets ───────────────
function buildPlanet(coin, idx, btcMc) {
  const group = new THREE.Group();

  // Size: pow(ratio, 0.42) for visual readability
  const ratio = Math.max(coin.market_cap / btcMc, 0.0001);
  const radius = Math.max(PLANET_MIN, Math.min(PLANET_MAX, Math.pow(ratio, 0.4) * 5.2));

  // Distance: log-spaced + linear by index
  const distance = ORBIT_BASE + idx * ORBIT_STEP + Math.random() * 0.8;

  // Neutral placeholder color — replaced asynchronously with the icon's
  // dominant brand color as soon as the PNG loads (typically <1s)
  let baseColor = 0x4a5266;

  // Planet sphere with procedural texture & subtle bump
  const tex = makePlanetTexture(baseColor, 0);
  const planetMat = new THREE.MeshStandardMaterial({
    map: tex,
    bumpMap: tex,
    bumpScale: 0.12,
    roughness: 0.78,
    metalness: 0.18,
  });
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 48, 48),
    planetMat
  );
  group.add(mesh);

  // Random axial tilt (gives each world a subtle character)
  mesh.rotation.z = (Math.random() - 0.5) * 0.6;

  // Subtle atmosphere glow
  const atmoTex = makeRadialGlow();
  const atmoMat = new THREE.SpriteMaterial({
    map: atmoTex,
    color: baseColor,
    transparent: true,
    opacity: 0.35,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const atmo = new THREE.Sprite(atmoMat);
  const atmoSize = radius * 3.0;
  atmo.scale.set(atmoSize, atmoSize, 1);
  group.add(atmo);

  // Floating coin icon (Sims-plumbob style — bobs gently above the planet).
  // The third arg is a callback that fires once the icon image has been
  // analyzed; we use it to recolor this planet to match the coin's brand.
  const iconSprite = makeFloatingIconSprite(coin.image, false, (dominantColor) => {
    baseColor = dominantColor;
    const fresh = makePlanetTexture(dominantColor, 0);
    const old = planetMat.map;
    planetMat.map = fresh;
    planetMat.bumpMap = fresh;
    planetMat.needsUpdate = true;
    if (old) old.dispose();
    atmoMat.color.setHex(dominantColor);
  });
  const iconSize = Math.max(1.8, radius * 1.3);
  iconSprite.scale.set(iconSize, iconSize, 1);
  const iconBaseY = radius + iconSize * 0.7;
  iconSprite.position.set(0, iconBaseY, 0);
  group.add(iconSprite);

  // Price label — even higher, above the icon, always rendered on top
  const priceLabel = makePriceLabel(coin, false);
  priceLabel.position.set(0, iconBaseY + iconSize * 0.7 + 1.4, 0);
  group.add(priceLabel);

  // Initial orbit position
  const angle = Math.random() * Math.PI * 2;
  group.position.set(
    Math.cos(angle) * distance,
    (Math.random() - 0.5) * 1.5,  // tiny vertical jitter
    Math.sin(angle) * distance
  );

  // Orbit ring (faint)
  const ringGeom = new THREE.RingGeometry(distance - 0.04, distance + 0.04, 256);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x4a5a8a,
    transparent: true,
    opacity: 0.10,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);

  scene.add(group);

  // Speed: base / sqrt(distance) * (1 + |change|/6) * sign
  const change = getCoinChange(coin);
  const baseSpeed = 0.36;
  const speedMult = 1 + Math.min(Math.abs(change), 50) / 6;
  const direction = change >= 0 ? 1 : -1;
  const speed = (baseSpeed / Math.sqrt(distance / 20)) * speedMult * direction;

  return {
    group, mesh, atmo, iconSprite, priceLabel, ring,
    coin, distance, angle, speed, radius,
    iconBaseY,
    bobPhase: Math.random() * Math.PI * 2,   // staggers planet bobs
    rotationSpeed: 0.06 + Math.random() * 0.10,
    isSun: false,
  };
}

function makePlanetTexture(baseColor, hue) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  const r = (baseColor >> 16) & 255;
  const g = (baseColor >> 8) & 255;
  const b = baseColor & 255;

  // Base gradient (slight darker at top/bottom)
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0,    `rgb(${r*0.7|0}, ${g*0.7|0}, ${b*0.7|0})`);
  grad.addColorStop(0.5,  `rgb(${r}, ${g}, ${b})`);
  grad.addColorStop(1,    `rgb(${r*0.55|0}, ${g*0.55|0}, ${b*0.55|0})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 512);

  // Cloud bands
  for (let i = 0; i < 14; i++) {
    const y = Math.random() * 512;
    const h = 8 + Math.random() * 28;
    const op = 0.05 + Math.random() * 0.18;
    const v = (Math.random() - 0.5) * 80;
    ctx.fillStyle = `rgba(${Math.max(0,Math.min(255,r+v))|0}, ${Math.max(0,Math.min(255,g+v))|0}, ${Math.max(0,Math.min(255,b+v))|0}, ${op})`;
    ctx.fillRect(0, y, 512, h);
  }

  // Surface noise / craters
  for (let i = 0; i < 380; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const rad = 2 + Math.random() * 14;
    const op = Math.random() * 0.35;
    const v = Math.random() < 0.5 ? -45 : 35;
    ctx.fillStyle = `rgba(${Math.max(0,Math.min(255,r+v))|0}, ${Math.max(0,Math.min(255,g+v))|0}, ${Math.max(0,Math.min(255,b+v))|0}, ${op})`;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle highlights (specular suggestions)
  for (let i = 0; i < 60; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const rad = 1 + Math.random() * 4;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.12})`;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();
  }

  return new THREE.CanvasTexture(c);
}

// ─────────────── Floating icon sprite (Sims-plumbob style) ───────────────
// Builds a circular floating badge: dark backing, the coin image clipped
// inside, a bright rim, and a subtle outer glow halo. The sprite renders
// with depthTest off so it's never occluded by the planet — and it bobs
// gently in the animation loop, the way a Sims plumbob hovers above a sim.
function makeFloatingIconSprite(imageUrl, isLarge, onColorReady) {
  // Placeholder until image arrives
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(20, 18, 30, 0.9)';
  ctx.beginPath();
  ctx.arc(128, 128, 100, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = isLarge ? 'rgba(255, 200, 90, 0.7)' : 'rgba(255, 255, 255, 0.45)';
  ctx.lineWidth = 3;
  ctx.stroke();

  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    depthTest: false,            // never hidden by 3D geometry
  });
  const sprite = new THREE.Sprite(mat);
  sprite.renderOrder = 998;       // just under price labels (999)

  // Async-load real coin icon
  if (imageUrl) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c2 = document.createElement('canvas');
      c2.width = c2.height = 256;
      const cc = c2.getContext('2d');

      // Outer glow halo (gives the floating-tag, plumbob-y feel)
      const glow = cc.createRadialGradient(128, 128, 80, 128, 128, 128);
      glow.addColorStop(0,   isLarge ? 'rgba(255, 200, 90, 0.55)'  : 'rgba(255, 255, 255, 0.22)');
      glow.addColorStop(0.5, isLarge ? 'rgba(255, 180, 60, 0.20)'  : 'rgba(255, 255, 255, 0.08)');
      glow.addColorStop(1,   'rgba(255, 255, 255, 0)');
      cc.fillStyle = glow;
      cc.fillRect(0, 0, 256, 256);

      // Clipped circular icon
      cc.save();
      cc.beginPath();
      cc.arc(128, 128, 100, 0, Math.PI * 2);
      cc.closePath();
      cc.clip();
      // Dark backing for icons that ship with transparent backgrounds
      cc.fillStyle = '#0a0814';
      cc.fillRect(28, 28, 200, 200);
      cc.drawImage(img, 28, 28, 200, 200);
      cc.restore();

      // Bright rim
      cc.strokeStyle = isLarge ? 'rgba(255, 200, 90, 0.95)' : 'rgba(255, 255, 255, 0.78)';
      cc.lineWidth = isLarge ? 5 : 3.5;
      cc.beginPath();
      cc.arc(128, 128, 100, 0, Math.PI * 2);
      cc.stroke();

      // Inner highlight arc (top) — gives the rim a slight metallic gleam
      cc.strokeStyle = 'rgba(255, 255, 255, 0.45)';
      cc.lineWidth = 2;
      cc.beginPath();
      cc.arc(128, 128, 95, Math.PI * 1.15, Math.PI * 1.85);
      cc.stroke();

      const newTex = new THREE.CanvasTexture(c2);
      mat.map.dispose();
      mat.map = newTex;
      mat.needsUpdate = true;

      // Notify caller with the icon's dominant color (for planet recolor)
      if (onColorReady) {
        const color = extractDominantColor(img);
        if (color !== null) onColorReady(color);
      }
    };
    img.onerror = () => {};
    img.src = imageUrl;
  }
  return sprite;
}

function makePriceLabel(coin, isLarge) {
  const c = document.createElement('canvas');
  const text = '$' + formatPrice(coin.current_price);
  const change = getCoinChange(coin);
  const changeStr = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';

  const fontPrice = isLarge ? 'bold 38px JetBrains Mono, monospace' : 'bold 26px JetBrains Mono, monospace';
  const fontChange = isLarge ? '600 22px Outfit, sans-serif' : '600 18px Outfit, sans-serif';

  // Measure
  const tmp = document.createElement('canvas').getContext('2d');
  tmp.font = fontPrice;
  const wPrice = tmp.measureText(text).width;
  tmp.font = fontChange;
  const wChange = tmp.measureText(changeStr).width;
  const w = Math.max(wPrice, wChange) + 36;
  const h = isLarge ? 90 : 68;

  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  // Background pill
  ctx.fillStyle = 'rgba(8, 6, 16, 0.88)';
  roundRect(ctx, 0, 0, w, h, 12);
  ctx.fill();
  ctx.strokeStyle = isLarge ? 'rgba(255, 184, 77, 0.55)' : 'rgba(255, 255, 255, 0.16)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Price text
  ctx.fillStyle = '#f4f1e8';
  ctx.font = fontPrice;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, isLarge ? 30 : 22);

  // Change %
  ctx.fillStyle = change >= 0 ? '#4ade80' : '#f87171';
  ctx.font = fontChange;
  ctx.fillText(changeStr, w / 2, isLarge ? 65 : 48);

  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    depthTest: false,   // always render in front of geometry
  });
  const sprite = new THREE.Sprite(mat);
  sprite.renderOrder = 999;  // drawn last, above everything else
  // Scale so width fits planet roughly
  const scale = isLarge ? 0.07 : 0.052;
  sprite.scale.set(w * scale, h * scale, 1);
  return sprite;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─────────────── API ───────────────
// Returns the price change % for the currently selected period, with a safe
// fallback chain. The "_in_currency" fields are what CoinGecko returns when
// price_change_percentage param is set; legacy `price_change_percentage_24h`
// is kept as a last-resort fallback for 24h.
function getCoinChange(coin) {
  if (currentPeriod === '7d') {
    return coin.price_change_percentage_7d_in_currency ?? 0;
  }
  if (currentPeriod === '30d') {
    return coin.price_change_percentage_30d_in_currency ?? 0;
  }
  return coin.price_change_percentage_24h_in_currency
      ?? coin.price_change_percentage_24h
      ?? 0;
}

// Human-readable label for the active period (used in legend & tooltip).
function periodLabel() {
  return currentPeriod === '7d' ? '7d' : currentPeriod === '30d' ? '30d' : '24h';
}

async function fetchCoins(limit) {
  // Request all three period changes at once so the user can switch
  // between 1D/7D/30D instantly without hitting the API again.
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=${limit}&page=1&price_change_percentage=24h,7d,30d`;
  const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function loadData(isRefresh) {
  if (isFetching) return;
  isFetching = true;
  setStatus(true, isRefresh ? 'Updating…' : 'Connecting…');

  try {
    const data = await fetchCoins(currentLimit);
    coinsData = data;
    rebuild(data);
    setStatus(true, 'Connected · CoinGecko API');
    document.getElementById('lastUpdate').textContent = formatTime(new Date());
    lastFetchOK = true;
    if (isRefresh) showNotification('Data updated');
    document.getElementById('loading').classList.add('hidden');
    // Cinematic arrival: only on the very first successful load
    if (!isRefresh) setTimeout(runIntroZoom, 100);
  } catch (err) {
    console.error('Fetch error:', err);
    setStatus(false, 'Failed · retrying in 30s');
    lastFetchOK = false;
    // Hide loader so the user sees the (empty) cosmos and the error state
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => loadData(isRefresh), 30000);
  } finally {
    isFetching = false;
  }

  // Setup refresh
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => loadData(true), REFRESH_MS);
}

function rebuild(data) {
  // Clear existing
  if (sun) {
    disposeGroup(sun.group);
    scene.remove(sun.group);
    sun = null;
  }
  planets.forEach(p => {
    disposeGroup(p.group);
    scene.remove(p.group);
    if (p.ring) {
      p.ring.geometry.dispose();
      p.ring.material.dispose();
      scene.remove(p.ring);
    }
  });
  planets = [];

  if (!data || !data.length) return;

  const btc = data.find(c => c.id === 'bitcoin') || data[0];
  buildSun(btc);

  const others = data.filter(c => c.id !== btc.id).slice(0, currentLimit - 1);
  others.forEach((coin, i) => {
    planets.push(buildPlanet(coin, i, btc.market_cap));
  });
}

function disposeGroup(group) {
  group.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => disposeMat(m));
      } else {
        disposeMat(child.material);
      }
    }
  });
}
function disposeMat(m) {
  if (m.map) m.map.dispose();
  if (m.bumpMap) m.bumpMap.dispose();
  m.dispose();
}

// ─────────────── Animation Loop ───────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Sun rotation + glow pulsation
  if (sun) {
    sun.surface.rotation.y += dt * 0.12;
    sun.inner.material.opacity = 0.78 + Math.sin(t * 1.2) * 0.08;
    sun.outer.material.opacity = 0.50 + Math.sin(t * 0.7) * 0.10;
    sun.far.material.opacity   = 0.18 + Math.sin(t * 0.4) * 0.05;
    // Plumbob bob (slow, wide) + price label tracks it
    if (sun.iconSprite) {
      const bob = Math.sin(t * 1.0) * 0.55;
      sun.iconSprite.position.y = sun.iconBaseY + bob;
      if (sun.priceLabel) sun.priceLabel.position.y = sun.iconBaseY + 5.2 * 0.7 + 2 + bob * 0.5;
    }
  }

  // Planet orbits
  planets.forEach(p => {
    p.angle += p.speed * dt * 0.18;
    p.group.position.x = Math.cos(p.angle) * p.distance;
    p.group.position.z = Math.sin(p.angle) * p.distance;
    p.mesh.rotation.y += dt * p.rotationSpeed;
    // Plumbob bob — Sims-style hover, with each planet on its own phase
    if (p.iconSprite) {
      const bob = Math.sin(t * 1.6 + p.bobPhase) * 0.20;
      p.iconSprite.position.y = p.iconBaseY + bob;
      if (p.priceLabel) {
        const iconSize = Math.max(1.8, p.radius * 1.3);
        p.priceLabel.position.y = p.iconBaseY + iconSize * 0.7 + 1.4 + bob * 0.5;
      }
    }
  });

  // Slow nebula drift
  nebulae.forEach((n, i) => {
    n.material.rotation = t * 0.005 * (i % 2 === 0 ? 1 : -1);
  });

  // Starfield slow rotation + per-star twinkle uniform
  if (starField) {
    starField.rotation.y = t * 0.005;
    if (starField.material.uniforms) starField.material.uniforms.time.value = t;
  }

  // Comets
  if (cometSystem) cometSystem.update(dt, t);

  // Raycast hover
  updateHover();

  controls.update();
  renderer.render(scene, camera);
}

// ─────────────── Hover/Tooltip ───────────────
function updateHover() {
  raycaster.setFromCamera(pointer, camera);
  const meshes = planets.map(p => p.mesh);
  if (sun) meshes.push(sun.mesh);
  const hits = raycaster.intersectObjects(meshes, false);

  if (hits.length > 0) {
    const obj = hits[0].object;
    const target = sun && sun.mesh === obj
      ? sun
      : planets.find(p => p.mesh === obj);
    if (target) {
      hovered = target;
      document.body.classList.add('hovering');
      showTooltip(target);
      return;
    }
  }
  hovered = null;
  document.body.classList.remove('hovering');
  hideTooltip();
}

function onPointerMove(e) {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  positionTooltip(e.clientX, e.clientY);
}

function onTouchTap(e) {
  if (e.touches.length === 1) {
    pointer.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    positionTooltip(e.touches[0].clientX, e.touches[0].clientY);
  }
}

function showTooltip(target) {
  const tt = document.getElementById('tooltip');
  const c = target.coin;
  const change = getCoinChange(c);
  const changeClass = change >= 0 ? 'green' : 'red';
  const sign = change >= 0 ? '+' : '';
  const dirText = target.isSun
    ? '<strong>System Center</strong>'
    : (change >= 0
        ? '<strong>Direct</strong> orbit · gain'
        : '<strong>Retrograde</strong> orbit · loss');
  const rank = c.market_cap_rank || '?';
  const pLabel = periodLabel();

  tt.innerHTML = `
    <div class="tt-header">
      <div class="tt-icon-wrap">
        <img class="tt-icon" src="${c.image}" alt="${c.name}" onerror="this.style.opacity=0.3">
        <div class="tt-rank">#${rank}</div>
      </div>
      <div>
        <div class="tt-name">${escapeHtml(c.name)}</div>
        <div class="tt-symbol">${escapeHtml(c.symbol)}</div>
      </div>
    </div>
    <div class="tt-row">
      <span class="tt-label">Price</span>
      <span class="tt-value">$${formatPrice(c.current_price)}</span>
    </div>
    <div class="tt-row">
      <span class="tt-label">${pLabel}</span>
      <span class="tt-value ${changeClass}">${sign}${change.toFixed(2)}%</span>
    </div>
    <div class="tt-row">
      <span class="tt-label">Market Cap</span>
      <span class="tt-value">$${formatLarge(c.market_cap)}</span>
    </div>
    <div class="tt-row">
      <span class="tt-label">Volume 24h</span>
      <span class="tt-value">$${formatLarge(c.total_volume)}</span>
    </div>
    <div class="tt-direction">${dirText}</div>
  `;
  tt.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

function positionTooltip(x, y) {
  const tt = document.getElementById('tooltip');
  const w = tt.offsetWidth || 260;
  const h = tt.offsetHeight || 200;
  let left = x + 22;
  let top = y + 22;
  if (left + w > window.innerWidth - 12)  left = x - w - 22;
  if (top + h > window.innerHeight - 12)  top = y - h - 22;
  tt.style.left = Math.max(12, left) + 'px';
  tt.style.top  = Math.max(12, top) + 'px';
}

// ─────────────── UI Helpers ───────────────
function setStatus(ok, text) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.classList.toggle('error', !ok);
}

function showNotification(text) {
  const n = document.getElementById('notification');
  n.textContent = text;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 1800);
}

function switchLimit(limit) {
  if (limit === currentLimit || isFetching) return;
  currentLimit = limit;
  document.getElementById('btn25').classList.toggle('active', limit === 25);
  document.getElementById('btn50').classList.toggle('active', limit === 50);
  loadData(true);
}

// Switch the active price-change period (24h / 7d / 30d). Because we already
// fetched all three from the API, this updates the existing scene in place:
// orbital direction & speed are recomputed, price labels regenerated, legend
// & tooltip text refreshed. No network request needed.
function switchPeriod(period) {
  if (period === currentPeriod) return;
  currentPeriod = period;

  // Toggle button active states
  document.getElementById('btn1D').classList.toggle('active',  period === '24h');
  document.getElementById('btn7D').classList.toggle('active',  period === '7d');
  document.getElementById('btn30D').classList.toggle('active', period === '30d');

  // Update legend text
  const label = periodLabel();
  const elUp   = document.getElementById('legendUp');
  const elDown = document.getElementById('legendDown');
  const elAbs  = document.getElementById('legendAbs');
  if (elUp)   elUp.textContent   = label + ' ↑';
  if (elDown) elDown.textContent = label + ' ↓';
  if (elAbs)  elAbs.textContent  = label;

  // Recompute orbital speed & direction for every planet, and refresh labels
  planets.forEach(p => {
    const change    = getCoinChange(p.coin);
    const baseSpeed = 0.36;
    const speedMult = 1 + Math.min(Math.abs(change), 50) / 6;
    const direction = change >= 0 ? 1 : -1;
    p.speed = (baseSpeed / Math.sqrt(p.distance / 20)) * speedMult * direction;
    refreshPriceLabel(p.priceLabel, p.coin, false);
  });

  // Refresh sun's price label too (BTC's change for the active period)
  if (sun) refreshPriceLabel(sun.priceLabel, sun.coin, true);

  // If a tooltip is currently visible, re-render it so the % updates live
  if (hovered) showTooltip(hovered);
}

// Regenerates the price label texture in place — keeps the same sprite so
// its position & bob animation aren't disturbed.
function refreshPriceLabel(sprite, coin, isLarge) {
  const fresh = makePriceLabel(coin, isLarge);
  if (sprite.material.map) sprite.material.map.dispose();
  sprite.material.map = fresh.material.map;
  sprite.material.needsUpdate = true;
  sprite.scale.copy(fresh.scale);
  // The throwaway sprite's material still references the (now-shared) map;
  // detach before disposing so we don't free a texture we just transferred.
  fresh.material.map = null;
  fresh.material.dispose();
}

// Toggles all background ambience: starfield + nebulae + comet system
function toggleAmbience() {
  ambienceOn = !ambienceOn;
  if (starField) starField.visible = ambienceOn;
  nebulae.forEach(n => n.visible = ambienceOn);
  if (cometSystem) cometSystem.setEnabled(ambienceOn);
  const btn = document.getElementById('btnStars');
  btn.classList.toggle('off', !ambienceOn);
  document.getElementById('starsLabel').textContent = ambienceOn ? 'Stars On' : 'Stars Off';
}

function onResize() {
  applyResponsiveCamera();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Treat narrow / portrait screens (phones) specially.
function isNarrowViewport() {
  return window.innerWidth < 768 || (window.innerWidth / window.innerHeight) < 0.85;
}

// Keep the horizontal framing comfortable on tall/narrow screens by widening
// the vertical FOV as the aspect ratio drops. Desktop (aspect ≥ 1.25) keeps
// the original 55° look exactly.
function applyResponsiveCamera() {
  if (!camera) return;
  const aspect = window.innerWidth / window.innerHeight;
  camera.aspect = aspect;
  const baseVFov = 55;
  if (aspect < 1.25) {
    // horizontal FOV that 55° gives at our reference desktop-ish aspect
    const refH = 2 * Math.atan(Math.tan(baseVFov * Math.PI / 360) * 1.25);
    const vFov = 2 * Math.atan(Math.tan(refH / 2) / aspect) * 180 / Math.PI;
    camera.fov = Math.min(Math.max(vFov, baseVFov), 74); // cap to limit distortion
  } else {
    camera.fov = baseVFov;
  }
  camera.updateProjectionMatrix();
}

// ─────────────── Utils ───────────────
// Extracts a single representative color from a coin icon PNG. Samples a
// downscaled 48×48 grid; for each pixel, weights by (saturation × luminance)
// so vivid brand colors dominate while flat white/black backgrounds and
// near-grayscale pixels are ignored. Returns 0xRRGGBB or null on failure.
function extractDominantColor(img) {
  const SIZE = 48;
  const c = document.createElement('canvas');
  c.width = c.height = SIZE;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, SIZE, SIZE);

  let data;
  try { data = ctx.getImageData(0, 0, SIZE, SIZE).data; }
  catch (e) { return null; }   // CORS-tainted canvas

  let r = 0, g = 0, b = 0, totalW = 0;
  // Fallback accumulator (in case all pixels get filtered out)
  let fr = 0, fg = 0, fb = 0, fc = 0;

  for (let i = 0; i < data.length; i += 4) {
    const a = data[i + 3];
    if (a < 80) continue;                              // transparent
    const pr = data[i], pg = data[i + 1], pb = data[i + 2];

    // Fallback (any visible pixel)
    fr += pr; fg += pg; fb += pb; fc++;

    const max = Math.max(pr, pg, pb);
    const min = Math.min(pr, pg, pb);
    if (min > 235) continue;                           // near-white
    if (max < 22)  continue;                           // near-black
    const sat = max === 0 ? 0 : (max - min) / max;
    if (sat < 0.08 && max > 180) continue;             // light grays
    const lum = max / 255;
    const w = (sat * 2.5 + lum * 0.6) * (a / 255);

    r += pr * w; g += pg * w; b += pb * w; totalW += w;
  }

  let cr, cg, cb;
  if (totalW > 0) {
    cr = r / totalW; cg = g / totalW; cb = b / totalW;
  } else if (fc > 0) {
    cr = fr / fc; cg = fg / fc; cb = fb / fc;
  } else {
    return null;
  }

  // Slight saturation boost so the planet's dominant hue reads clearly
  // at small on-screen sizes
  const avg = (cr + cg + cb) / 3;
  const k = 1.18;
  cr = Math.max(0, Math.min(255, avg + (cr - avg) * k));
  cg = Math.max(0, Math.min(255, avg + (cg - avg) * k));
  cb = Math.max(0, Math.min(255, avg + (cb - avg) * k));

  return (Math.round(cr) << 16) | (Math.round(cg) << 8) | Math.round(cb);
}

function formatPrice(n) {
  if (n == null) return '—';
  if (n >= 1000) return n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1)    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 0.01) return n.toFixed(4);
  if (n >= 0.0001) return n.toFixed(6);
  return n.toExponential(2);
}

function formatLarge(n) {
  if (n == null) return '—';
  if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n / 1e9).toFixed(2)  + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(2)  + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(2)  + 'K';
  return n.toLocaleString();
}

function formatTime(d) {
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[ch]);
}

// ─────────────── Cinematic intro zoom ───────────────
// Equivalent of 40 wheel-up scrolls (each ~deltaY=-100, matching the
// SimpleOrbitControls onWheel formula radius *= 1.0015^deltaY), eased
// over 2.5 s for a "falling into the cosmos" arrival shot. Any pointer
// input cancels it instantly so the user keeps full agency.
let introZoomActive = false;
function runIntroZoom() {
  if (introZoomActive || !controls) return;
  introZoomActive = true;

  const startRadius  = controls.radius;
  const wheelFactor  = Math.pow(1.0015, 40 * -100);
  // 40 scrolls would clamp at minDistance (too aggressive); travel half
  // the distance for a more contemplative arrival.
  const fullTarget   = Math.max(controls.minDistance, startRadius * wheelFactor);
  const targetRadius = startRadius + (fullTarget - startRadius) * 0.5;
  const duration     = 2500;
  const startTime    = performance.now();

  const dom = renderer.domElement;
  const cancel = () => { introZoomActive = false; cleanup(); };
  const cleanup = () => {
    dom.removeEventListener('mousedown',  cancel);
    dom.removeEventListener('touchstart', cancel);
    dom.removeEventListener('wheel',      cancel);
  };
  dom.addEventListener('mousedown',  cancel);
  dom.addEventListener('touchstart', cancel);
  dom.addEventListener('wheel',      cancel);

  function step(now) {
    if (!introZoomActive) return;
    const t = Math.min(1, (now - startTime) / duration);
    // easeInOutCubic — slow start, accelerated middle, gentle landing
    const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    controls.radius = startRadius + (targetRadius - startRadius) * eased;
    if (t < 1) requestAnimationFrame(step);
    else { introZoomActive = false; cleanup(); }
  }
  requestAnimationFrame(step);
}

// ─────────────── Simple Orbit Controls ───────────────
function SimpleOrbitControls(camera, dom) {
  this.camera = camera;
  this.dom = dom;
  this.target = new THREE.Vector3(0, 0, 0);
  this.theta = -Math.PI / 2;
  this.phi = Math.PI * 0.38;
  this.radius = 165;
  this.minDistance = 25;
  this.maxDistance = 400;
  this.autoTheta = 0;
  this._dragging = false;
  this._prev = { x: 0, y: 0 };
  this._velTheta = 0;
  this._velPhi = 0;
  this._lastMove = 0;

  const onDown = (e) => {
    this._dragging = true;
    const p = e.touches ? e.touches[0] : e;
    this._prev = { x: p.clientX, y: p.clientY };
    this._velTheta = this._velPhi = 0;
  };
  const onMove = (e) => {
    if (!this._dragging) return;
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    const dx = p.clientX - this._prev.x;
    const dy = p.clientY - this._prev.y;
    this.theta -= dx * 0.005;
    this.phi   -= dy * 0.005;
    this.phi = Math.max(0.08, Math.min(Math.PI - 0.08, this.phi));
    this._velTheta = -dx * 0.005;
    this._velPhi   = -dy * 0.005;
    this._prev = { x: p.clientX, y: p.clientY };
    this._lastMove = performance.now();
  };
  const onUp = () => { this._dragging = false; };
  const onWheel = (e) => {
    e.preventDefault();
    this.radius *= Math.pow(1.0015, e.deltaY);
    this.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.radius));
  };
  // Pinch zoom support
  let lastPinch = 0;
  const onTouchMove2 = (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastPinch > 0) {
        this.radius *= lastPinch / dist;
        this.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this.radius));
      }
      lastPinch = dist;
      e.preventDefault();
    } else {
      lastPinch = 0;
    }
  };

  dom.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  dom.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchmove', onTouchMove2, { passive: false });
  window.addEventListener('touchend', onUp);
  dom.addEventListener('wheel', onWheel, { passive: false });

  this.update = function () {
    // Inertia decay
    if (!this._dragging) {
      const idleMs = performance.now() - this._lastMove;
      if (idleMs > 30) {
        this.theta += this._velTheta;
        this.phi   += this._velPhi;
        this.phi = Math.max(0.08, Math.min(Math.PI - 0.08, this.phi));
        this._velTheta *= 0.94;
        this._velPhi   *= 0.94;
        // Ambient slow auto-rotation when fully idle
        if (idleMs > 4000 && Math.abs(this._velTheta) < 0.0005) {
          this.theta -= 0.0006;
        }
      }
    }
    const x = this.target.x + this.radius * Math.sin(this.phi) * Math.cos(this.theta);
    const y = this.target.y + this.radius * Math.cos(this.phi);
    const z = this.target.z + this.radius * Math.sin(this.phi) * Math.sin(this.theta);
    this.camera.position.set(x, y, z);
    this.camera.lookAt(this.target);
  };
}

// ─────────────── Boot ───────────────
if (document.fonts && document.fonts.ready) {
  Promise.race([
    document.fonts.ready,
    new Promise(r => setTimeout(r, 1500))   // don't wait forever
  ]).then(init);
} else {
  init();
}

</script>
