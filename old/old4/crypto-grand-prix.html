/* =====================================================================
 *                        SPEED MAPPING
 * ===================================================================== */
function getPerf(coin) {
  const map = {
    '1h':  'price_change_percentage_1h_in_currency',
    '24h': 'price_change_percentage_24h_in_currency',
    '7d':  'price_change_percentage_7d_in_currency'
  };
  const v = coin[map[state.timeframe]];
  return (typeof v === 'number' && !isNaN(v)) ? v : 0;
}

function speedMultiplier(perf) {
  // Non-linear mapping with tanh; clamp range so extreme values don't break visuals
  if (perf > 0.5) {
    return 1 + 0.55 * Math.tanh((perf - 0.5) / 6);
  } else if (perf < -0.5) {
    return 1 + 0.55 * Math.tanh((perf + 0.5) / 6); // negative → less than 1
  }
  return 1;
}

/* =====================================================================
 *                          CARS
 * ===================================================================== */
function buildCars(coins) {
  const cars = [];
  // Distribute initial positions evenly along the lap; assign lanes round-robin
  for (let i = 0; i < coins.length; i++) {
    const coin = coins[i];
    const initialDistance = (i / coins.length) * state.totalArc;
    const laneIdx = i % CFG.LANE_COUNT;
    const car = {
      id: coin.id,
      symbol: (coin.symbol || '').toUpperCase(),
      name: coin.name || coin.id,
      coin: coin,
      distance: initialDistance,
      lapsCompleted: 0,
      lane: laneIdx,
      laneOffset: 0,    // animated towards (laneIdx - 1.5) * spacing
      speedMul: 1,
      perf: getPerf(coin),
      img: null,
      color: symFallback(coin.symbol) || hashColor(coin.symbol || coin.id),
      trail: [],
      smoke: [],
    };
    cars.push(car);
  }
  // Kick off async image loading; update colors as they arrive
  for (const car of cars) {
    if (car.coin.image) {
      loadCoinImage(car.coin.image, car.coin.symbol).then(entry => {
        if (entry) {
          car.img = entry.img;
          if (entry.color) car.color = entry.color;
        }
      });
    }
  }
  return cars;
}

function syncCarsWithCoins(coins) {
  // Reuse existing car position state when possible
  const oldByid = new Map(state.cars.map(c => [c.id, c]));
  const newCars = [];
  for (let i = 0; i < coins.length; i++) {
    const coin = coins[i];
    const old = oldByid.get(coin.id);
    if (old) {
      old.coin = coin;
      old.perf = getPerf(coin);
      old.symbol = (coin.symbol || '').toUpperCase();
      old.name = coin.name || coin.id;
      old.marketRank = i;
      newCars.push(old);
    } else {
      const initialDistance = (i / coins.length) * state.totalArc;
      const laneIdx = i % CFG.LANE_COUNT;
      const car = {
        id: coin.id,
        symbol: (coin.symbol || '').toUpperCase(),
        name: coin.name || coin.id,
        coin,
        marketRank: i,
        distance: initialDistance,
        lapsCompleted: 0,
        lane: laneIdx,
        laneOffset: (laneIdx - (CFG.LANE_COUNT - 1) / 2) * (state.trackWidth / CFG.LANE_COUNT),
        speedMul: 1,
        perf: getPerf(coin),
        img: null,
        color: symFallback(coin.symbol) || hashColor(coin.symbol || coin.id),
        trail: [],
        smoke: [],
      };
      if (coin.image) {
        loadCoinImage(coin.image, coin.symbol).then(entry => {
          if (entry) {
            car.img = entry.img;
            if (entry.color) car.color = entry.color;
          }
        });
      }
      newCars.push(car);
    }
  }
  state.cars = newCars;
  // make sure lanes are set
  for (let i = 0; i < state.cars.length; i++) {
    state.cars[i].lane = i % CFG.LANE_COUNT;
  }
}

/* =====================================================================
 *                       UPDATE & RENDER LOOP
 * ===================================================================== */
let lastTs = performance.now();
function loop(ts) {
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;
  if (!state.paused) updateCars(dt);
  renderFrame();
  requestAnimationFrame(loop);
}

function updateCars(dt) {
  const tw = state.trackWidth;
  const spacing = tw / (CFG.LANE_COUNT + 1);
  const baseSpeed = CFG.BASE_SPEED_PX_S;
  let leaderDistance = 0;

  for (let i = 0; i < state.cars.length; i++) {
    const c = state.cars[i];
    // smoothly move towards target speed multiplier
    const targetMul = speedMultiplier(c.perf);
    c.speedMul += (targetMul - c.speedMul) * Math.min(1, dt * 1.4);

    // smoothly move towards target lane offset
    const targetLane = (c.lane - (CFG.LANE_COUNT - 1) / 2) * spacing;
    c.laneOffset += (targetLane - c.laneOffset) * Math.min(1, dt * 2);

    const v = baseSpeed * c.speedMul;
    const prevDist = c.distance;
    c.distance += v * dt;
    if (c.distance > state.totalArc) {
      c.distance -= state.totalArc;
      c.lapsCompleted++;
    }

    const pos = getTrackPosition(c.distance, c.laneOffset);
    c.x = pos.x; c.y = pos.y; c.angle = pos.angle;

    // Trail (only when accelerating)
    if (c.perf > 0.5) {
      c.trail.push({ x: c.x, y: c.y, age: 0 });
      if (c.trail.length > CFG.TRAIL_LENGTH) c.trail.shift();
    } else {
      // gradually drain trail
      if (c.trail.length > 0 && Math.random() < 0.6) c.trail.shift();
    }
    for (let t = 0; t < c.trail.length; t++) c.trail[t].age += dt;

    // Smoke (only when underperforming)
    if (c.perf < -0.5) {
      const intensity = Math.min(1, Math.abs(c.perf) / 8);
      // emit roughly proportional to intensity, but cap pool
      if (c.smoke.length < CFG.SMOKE_MAX_PER_CAR && Math.random() < intensity * 0.85) {
        const tailX = c.x - Math.cos(c.angle) * (CFG.CAR_LEN * 0.55);
        const tailY = c.y - Math.sin(c.angle) * (CFG.CAR_LEN * 0.55);
        c.smoke.push({
          x: tailX, y: tailY,
          vx: -Math.cos(c.angle) * 14 + (Math.random() - 0.5) * 16,
          vy: -Math.sin(c.angle) * 14 + (Math.random() - 0.5) * 16,
          life: 0, ttl: 1.2 + Math.random() * 0.6,
          size: 6 + Math.random() * 6
        });
      }
    }
    // update smoke
    for (let s = c.smoke.length - 1; s >= 0; s--) {
      const p = c.smoke[s];
      p.life += dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= 0.92; p.vy *= 0.92;
      p.size += 22 * dt;
      if (p.life >= p.ttl) c.smoke.splice(s, 1);
    }

    if (c.distance > leaderDistance) leaderDistance = c.distance;
  }

  // Update lap counter for leader
  if (state.cars.length > 0) {
    const leader = state.cars.reduce((a, b) =>
      (a.lapsCompleted * state.totalArc + a.distance) >
      (b.lapsCompleted * state.totalArc + b.distance) ? a : b
    );
    state.leaderLapsCompleted = leader.lapsCompleted;
  }
}

function renderFrame() {
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  // Background + track (from cache)
  if (trackCacheCanvas) {
    ctx.drawImage(trackCacheCanvas, 0, 0, W, H);
  } else {
    drawTrack();
  }

  // Smoke first (under cars, but above trail of fast cars? — render in sensible order)
  // Order: smoke (rear) → trails → cars
  for (const c of state.cars) drawSmoke(c);
  for (const c of state.cars) drawTrail(c);
  for (const c of state.cars) drawCar(c);

  // HUD overlays inside canvas
  drawLapBanner();

  // Update DOM bits that depend on state
  updateLapDisplay();
}

function drawSmoke(c) {
  if (c.smoke.length === 0) return;
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  for (const p of c.smoke) {
    const lifeFrac = p.life / p.ttl;
    const alpha = (1 - lifeFrac) * 0.45;
    const radius = p.size * (0.6 + lifeFrac * 1.4);
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
    grad.addColorStop(0, `rgba(70, 70, 78, ${alpha})`);
    grad.addColorStop(0.6, `rgba(40, 40, 46, ${alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawTrail(c) {
  if (c.trail.length < 2 || c.perf <= 0.5) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 1; i < c.trail.length; i++) {
    const t = i / c.trail.length;
    const alpha = t * 0.55 * Math.min(1, (c.perf - 0.5) / 6);
    const lw = 2 + t * 9;
    ctx.strokeStyle = withAlpha(c.color, alpha);
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(c.trail[i - 1].x, c.trail[i - 1].y);
    ctx.lineTo(c.trail[i].x, c.trail[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCar(c) {
  const len = CFG.CAR_LEN;
  const wid = CFG.CAR_WID;
  const halfL = len * 0.5;
  const halfW = wid * 0.5;
  const isHovered = state.hoveredCarId === c.id;

  ctx.save();
  ctx.translate(c.x, c.y);

  // Hover halo (rendered before rotation so it's circular)
  if (isHovered) {
    const pulse = 1 + 0.08 * Math.sin(performance.now() * 0.006);
    const glow = ctx.createRadialGradient(0, 0, len * 0.4, 0, 0, len * 1.2 * pulse);
    glow.addColorStop(0, withAlpha(c.color, 0.55));
    glow.addColorStop(0.4, withAlpha(c.color, 0.25));
    glow.addColorStop(1, withAlpha(c.color, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, len * 1.2 * pulse, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.rotate(c.angle);

  // ===== NIGHT MODE: headlight beams projecting forward onto the asphalt =====
  if (state.nightMode) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    // Two long, soft cone beams converging slightly forward of the car
    const beamLen = len * 3.6;
    const beamSpread = wid * 1.6;
    const beamStartY = halfW * 0.45;

    for (const sign of [-1, 1]) {
      const startX = halfL - 0.5;
      const startY = sign * beamStartY;
      const endX = halfL + beamLen;
      const grad = ctx.createLinearGradient(startX, startY, endX, sign * beamSpread);
      grad.addColorStop(0,    'rgba(255, 240, 190, 0.55)');
      grad.addColorStop(0.15, 'rgba(255, 235, 175, 0.36)');
      grad.addColorStop(0.55, 'rgba(255, 230, 160, 0.18)');
      grad.addColorStop(1,    'rgba(255, 225, 150, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(startX, sign * 1.2);
      ctx.lineTo(endX, sign * (beamSpread + 1));
      ctx.lineTo(endX, sign * (beamSpread - 5));
      ctx.lineTo(startX, sign * (1.2 + 1.4));
      ctx.closePath();
      ctx.fill();
    }

    // Bright focused core beam down the center (stronger near the car, fades fast)
    const coreGrad = ctx.createLinearGradient(halfL, 0, halfL + beamLen * 0.6, 0);
    coreGrad.addColorStop(0,   'rgba(255, 245, 210, 0.55)');
    coreGrad.addColorStop(0.4, 'rgba(255, 240, 180, 0.18)');
    coreGrad.addColorStop(1,   'rgba(255, 235, 170, 0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.moveTo(halfL, -halfW * 0.55);
    ctx.lineTo(halfL + beamLen * 0.6, -beamSpread * 0.55);
    ctx.lineTo(halfL + beamLen * 0.6,  beamSpread * 0.55);
    ctx.lineTo(halfL,  halfW * 0.55);
    ctx.closePath();
    ctx.fill();

    // Tight bright pools on the asphalt right at the headlight bulbs
    for (const sign of [-1, 1]) {
      const px = halfL + 1.5;
      const py = sign * (halfW - 2.5);
      const pool = ctx.createRadialGradient(px, py, 0, px, py, 9);
      pool.addColorStop(0,   'rgba(255, 250, 220, 0.95)');
      pool.addColorStop(0.5, 'rgba(255, 240, 180, 0.45)');
      pool.addColorStop(1,   'rgba(255, 235, 170, 0)');
      ctx.fillStyle = pool;
      ctx.beginPath();
      ctx.arc(px, py, 9, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ----- Drop shadow -----
  ctx.fillStyle = state.nightMode ? 'rgba(0,0,0,0.65)' : 'rgba(0,0,0,0.42)';
  ctx.beginPath();
  ctx.ellipse(2, 2.5, len * 0.48, wid * 0.65, 0, 0, Math.PI * 2);
  ctx.fill();

  // ----- Wheels (drawn first so they tuck under body, peek out at sides) -----
  ctx.fillStyle = '#08080a';
  // front pair
  roundedRect(len * 0.20, -halfW - 1.8, 8, 5, 1);
  roundedRect(len * 0.20, halfW - 3.2, 8, 5, 1);
  // rear pair (slightly larger — Road Fighter aesthetic)
  roundedRect(-len * 0.42, -halfW - 2, 9.5, 6, 1);
  roundedRect(-len * 0.42, halfW - 4, 9.5, 6, 1);

  // ----- Main body — rounded rectangle with very slight nose taper -----
  const r = 3.2; // corner radius
  const tip = halfL;
  const noseInset = 0.8; // tiny taper
  ctx.beginPath();
  // front-right curve
  ctx.moveTo(tip - r, halfW - noseInset);
  ctx.quadraticCurveTo(tip, halfW - noseInset, tip, halfW - r - noseInset);
  ctx.lineTo(tip, -halfW + r + noseInset);
  ctx.quadraticCurveTo(tip, -halfW + noseInset, tip - r, -halfW + noseInset);
  // along right side toward rear
  ctx.lineTo(-halfL + r, -halfW);
  ctx.quadraticCurveTo(-halfL, -halfW, -halfL, -halfW + r);
  ctx.lineTo(-halfL, halfW - r);
  ctx.quadraticCurveTo(-halfL, halfW, -halfL + r, halfW);
  ctx.lineTo(tip - r, halfW - noseInset);
  ctx.closePath();

  // Body fill — vertical gradient gives faux-3D shading
  const bodyGrad = ctx.createLinearGradient(0, -halfW, 0, halfW);
  bodyGrad.addColorStop(0, shade(c.color, 0.10));
  bodyGrad.addColorStop(0.5, c.color);
  bodyGrad.addColorStop(1, shade(c.color, -0.22));
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Body outline
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.stroke();

  // ----- Front bumper line -----
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.fillRect(len * 0.42, -halfW + 1.5, 1.2, wid - 3);

  // ----- Hood vent / detail (Road Fighter has a small black square on hood) -----
  ctx.fillStyle = 'rgba(0,0,0,0.40)';
  ctx.fillRect(len * 0.30, -wid * 0.18, 4.5, wid * 0.36);

  // ----- Windshield (front, dark trapezoid — wider at rear, narrower at front) -----
  ctx.beginPath();
  ctx.moveTo(len * 0.22, -halfW + 3.5);
  ctx.lineTo(len * 0.07, -halfW + 2);
  ctx.lineTo(len * 0.07, halfW - 2);
  ctx.lineTo(len * 0.22, halfW - 3.5);
  ctx.closePath();
  const wsGrad = ctx.createLinearGradient(0, -halfW, 0, halfW);
  wsGrad.addColorStop(0, 'rgba(18, 26, 42, 0.95)');
  wsGrad.addColorStop(0.5, 'rgba(40, 56, 78, 0.92)');
  wsGrad.addColorStop(1, 'rgba(18, 26, 42, 0.95)');
  ctx.fillStyle = wsGrad;
  ctx.fill();
  // windshield reflection sheen
  ctx.fillStyle = 'rgba(255,255,255,0.20)';
  ctx.fillRect(len * 0.10, -halfW + 4, len * 0.10, 1.3);

  // ----- Roof (lighter strip between windshield and rear window) -----
  ctx.fillStyle = shade(c.color, 0.20);
  ctx.fillRect(-len * 0.16, -halfW + 4.2, len * 0.22, wid - 8.4);
  // roof outline
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.fillRect(-len * 0.16, -halfW + 4.2, len * 0.22, 0.8);
  ctx.fillRect(-len * 0.16, halfW - 5, len * 0.22, 0.8);

  // ----- Rear window (smaller dark trapezoid) -----
  ctx.beginPath();
  ctx.moveTo(-len * 0.16, -halfW + 3);
  ctx.lineTo(-len * 0.32, -halfW + 4);
  ctx.lineTo(-len * 0.32, halfW - 4);
  ctx.lineTo(-len * 0.16, halfW - 3);
  ctx.closePath();
  ctx.fillStyle = 'rgba(20, 28, 42, 0.92)';
  ctx.fill();

  // ----- Rear deck panel line -----
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(-len * 0.42, -halfW + 2, 1, wid - 4);

  // ----- Headlights (front corners) -----
  ctx.fillStyle = state.nightMode ? 'rgba(255, 252, 230, 1)' : 'rgba(255, 235, 175, 0.95)';
  ctx.fillRect(len * 0.43, -halfW + 1.5, 3, 2);
  ctx.fillRect(len * 0.43, halfW - 3.5, 3, 2);

  // ----- Tail lights (rear corners) -----
  ctx.fillStyle = state.nightMode ? 'rgba(255, 80, 70, 1)' : 'rgba(225, 45, 50, 0.98)';
  ctx.fillRect(-len * 0.485, -halfW + 1.5, 2.5, 2);
  ctx.fillRect(-len * 0.485, halfW - 3.5, 2.5, 2);

  // Night extras: bright headlight halos + faint red tail glow
  if (state.nightMode) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // headlight bulb glow
    for (const sign of [-1, 1]) {
      const hx = len * 0.445 + 1.5;
      const hy = sign * (halfW - 2.5);
      const g = ctx.createRadialGradient(hx, hy, 0, hx, hy, 5);
      g.addColorStop(0,   'rgba(255, 252, 230, 1)');
      g.addColorStop(0.5, 'rgba(255, 240, 190, 0.6)');
      g.addColorStop(1,   'rgba(255, 235, 170, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(hx, hy, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    // faint red tail glow (subtle — just enough to read at night)
    for (const sign of [-1, 1]) {
      const tx = -len * 0.485 + 1.25;
      const ty = sign * (halfW - 2.5);
      const g = ctx.createRadialGradient(tx, ty, 0, tx, ty, 6);
      g.addColorStop(0,   'rgba(255, 70, 60, 0.55)');
      g.addColorStop(0.5, 'rgba(220, 30, 30, 0.22)');
      g.addColorStop(1,   'rgba(180, 0, 0, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(tx, ty, 6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ----- Side mirrors (tiny stubs at windshield level) -----
  ctx.fillStyle = shade(c.color, -0.30);
  ctx.fillRect(len * 0.18, -halfW - 1.3, 1.8, 1.5);
  ctx.fillRect(len * 0.18, halfW - 0.2, 1.8, 1.5);

  // ----- Subtle body highlight (sun reflection on roof) -----
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(-len * 0.10, -halfW + 5.5, len * 0.12, 0.8);

  ctx.restore();

  // Symbol label (drawn upright, not rotated)
  drawCarLabel(c);
}

function drawCarLabel(c) {
  // Floating coin icon hovering above the car — Sims plumbob style:
  //   • bobs gently up & down (each car phase-shifted)
  //   • soft glow halo in the car's accent color
  //   • faint shadow beneath where it would land (constant, doesn't bob)
  const baseOff = CFG.CAR_LEN * 0.65 + 20;

  // unique bob phase per car (init once)
  if (c.bobPhase === undefined) c.bobPhase = Math.random() * Math.PI * 2;
  const t = performance.now() * 0.0022;
  const bob = Math.sin(t + c.bobPhase) * 2.2;

  const iconR = 13;
  const x = c.x;
  const y = c.y - baseOff + bob;

  ctx.save();

  // 1) Faint static shadow on the asphalt directly under the icon's resting point
  ctx.fillStyle = state.nightMode ? 'rgba(0,0,0,0.30)' : 'rgba(0,0,0,0.20)';
  ctx.beginPath();
  ctx.ellipse(c.x, c.y - baseOff + iconR + 4, iconR * 0.6, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 2) Glow halo — pulses gently with the bob
  const glowR = iconR + 9;
  const halo = ctx.createRadialGradient(x, y, iconR - 1, x, y, glowR);
  halo.addColorStop(0,   withAlpha(c.color, state.nightMode ? 0.70 : 0.55));
  halo.addColorStop(0.5, withAlpha(c.color, state.nightMode ? 0.28 : 0.20));
  halo.addColorStop(1,   withAlpha(c.color, 0));
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(x, y, glowR, 0, Math.PI * 2);
  ctx.fill();

  // 3) Dark backing disc
  ctx.beginPath();
  ctx.arc(x, y, iconR, 0, Math.PI * 2);
  ctx.fillStyle = '#0b0d12';
  ctx.fill();

  // 4) Coin image (clipped to circle), or symbol fallback
  const cacheEntry = c.coin.image ? imageCache.get(c.coin.image) : null;
  const img = cacheEntry && cacheEntry.img;

  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, iconR - 2, 0, Math.PI * 2);
  ctx.clip();
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x - (iconR - 2), y - (iconR - 2), (iconR - 2) * 2, (iconR - 2) * 2);
  } else {
    // Fallback: solid car-color disc with symbol text
    ctx.fillStyle = c.color;
    ctx.fillRect(x - iconR, y - iconR, iconR * 2, iconR * 2);
    ctx.fillStyle = '#ffffff';
    ctx.font = '800 9px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.symbol.slice(0, 4), x, y);
  }
  ctx.restore();

  // 5) Accent ring in the car's color
  ctx.beginPath();
  ctx.arc(x, y, iconR - 1, 0, Math.PI * 2);
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = c.color;
  ctx.stroke();

  // 6) Top-left specular shine for the "3D plumbob" feel
  const shine = ctx.createRadialGradient(x - 4, y - 5, 0, x - 4, y - 5, 9);
  shine.addColorStop(0, 'rgba(255,255,255,0.40)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shine;
  ctx.beginPath();
  ctx.arc(x, y, iconR - 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawLapBanner() {
  // upper-left corner overlay: a small "current leader" badge or similar
  // To keep visuals clean, no extra banner here.
}

function roundedRect(x, y, w, h, r = 2) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function withAlpha(color, a) {
  // accept rgb/hsl/hex, return string with alpha. For simplicity, use rgba via a tmp element.
  // We assume color is an rgb()/hsl()/hex value.
  if (color.startsWith('rgb(')) {
    return color.replace('rgb(', 'rgba(').replace(')', `, ${a})`);
  }
  if (color.startsWith('hsl(')) {
    return color.replace('hsl(', 'hsla(').replace(')', `, ${a})`);
  }
  if (color.startsWith('#')) {
    const hex = color.replace('#', '');
    const r = parseInt(hex.substring(0, 2), 16);
    const g = parseInt(hex.substring(2, 4), 16);
    const b = parseInt(hex.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${a})`;
  }
  return color;
}

function shade(color, amount) {
  // amount in [-1, 1]
  let r, g, b;
  if (color.startsWith('rgb')) {
    const m = color.match(/\d+(\.\d+)?/g);
    r = +m[0]; g = +m[1]; b = +m[2];
  } else if (color.startsWith('#')) {
    const hex = color.replace('#', '');
    r = parseInt(hex.substring(0, 2), 16);
    g = parseInt(hex.substring(2, 4), 16);
    b = parseInt(hex.substring(4, 6), 16);
  } else if (color.startsWith('hsl')) {
    // convert via canvas: shortcut, lighten/darken via L
    return color; // fallback: no change
  } else return color;

  const f = amount > 0 ? (255 - r) * amount + r : r * (1 + amount);
  const g2 = amount > 0 ? (255 - g) * amount + g : g * (1 + amount);
  const b2 = amount > 0 ? (255 - b) * amount + b : b * (1 + amount);
  return `rgb(${Math.max(0,Math.min(255,Math.round(f)))}, ${Math.max(0,Math.min(255,Math.round(g2)))}, ${Math.max(0,Math.min(255,Math.round(b2)))})`;
}

/* =====================================================================
 *                          LEADERBOARD DOM
 * ===================================================================== */
function rebuildLeaderboardDOM() {
  lbList.innerHTML = '';
  for (const car of state.cars) {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.dataset.id = car.id;
    row.style.setProperty('--car-color', car.color);
    row.innerHTML = `
      <div class="pos">—</div>
      <div class="icon-wrap">
        ${car.coin.image ? `<img src="${car.coin.image}" alt="${car.symbol}" referrerpolicy="no-referrer" />` : `<span class="fallback">${car.symbol.slice(0,3)}</span>`}
      </div>
      <div class="info">
        <div class="symbol">${car.symbol}</div>
        <div class="name">${car.name}</div>
      </div>
      <div class="price-block">
        <div class="price">$0.00</div>
        <span class="pct flat">▲ 0.00%</span>
      </div>
    `;
    row.addEventListener('mouseenter', () => { state.hoveredCarId = car.id; row.classList.add('highlighted'); });
    row.addEventListener('mouseleave', () => { state.hoveredCarId = null; row.classList.remove('highlighted'); });
    lbList.appendChild(row);
  }
  positionLeaderboardRows(true);
}

function positionLeaderboardRows(immediate = false) {
  // Sort according to ranking mode
  const ranked = [...state.cars].sort((a, b) => {
    if (state.rankingMode === 'marketcap') {
      return (a.marketRank ?? 0) - (b.marketRank ?? 0);
    }
    return b.perf - a.perf; // performance descending
  });
  const ROW_H = 76; // 72 row + 4 gap
  // Build a map from id -> row element by iterating
  const rowMap = new Map();
  for (const child of lbList.children) {
    if (child.dataset && child.dataset.id) rowMap.set(child.dataset.id, child);
  }
  for (let i = 0; i < ranked.length; i++) {
    const car = ranked[i];
    const row = rowMap.get(car.id);
    if (!row) continue;
    if (immediate) row.style.transition = 'none';
    row.style.top = `${i * ROW_H}px`;
    row.dataset.pos = i + 1;

    // Update content
    row.querySelector('.pos').textContent = i + 1;
    const priceEl = row.querySelector('.price');
    priceEl.textContent = formatPrice(car.coin.current_price);
    const pctEl = row.querySelector('.pct');
    const p = car.perf;
    const arrow = p > 0.05 ? '▲' : p < -0.05 ? '▼' : '◆';
    pctEl.textContent = `${arrow} ${p.toFixed(2)}%`;
    pctEl.classList.remove('up', 'down', 'flat');
    if (p > 0.05) pctEl.classList.add('up');
    else if (p < -0.05) pctEl.classList.add('down');
    else pctEl.classList.add('flat');

    // Border color
    row.style.setProperty('--car-color', car.color);
    if (immediate) {
      // re-enable transition next frame
      requestAnimationFrame(() => row.style.transition = '');
    }
  }
  // ensure list has min height
  lbList.style.minHeight = `${ranked.length * ROW_H + 12}px`;
}

function cssEscape(s) {
  return (s || '').replace(/[^a-zA-Z0-9_-]/g, '\\$&');
}

function formatPrice(v) {
  if (v == null || isNaN(v)) return '$—';
  if (v >= 1000) return `$${v.toLocaleString('en-US', { maximumFractionDigits: 2 })}`;
  if (v >= 1) return `$${v.toFixed(2)}`;
  if (v >= 0.01) return `$${v.toFixed(4)}`;
  if (v >= 0.0001) return `$${v.toFixed(6)}`;
  // very small: scientific-ish
  return `$${v.toPrecision(3)}`;
}

/* =====================================================================
 *                          STATUS / HUD
 * ===================================================================== */
function setStatus(kind, text) {
  statusDot.className = 'status-dot ' + kind;
  if (kind === 'live') statusDot.classList.add('live');
  statusText.textContent = text;
}

function updateClock() {
  if (!state.lastUpdate) {
    statusTime.textContent = '— : — : —';
  } else {
    const now = new Date();
    const diff = Math.round((now - state.lastUpdate) / 1000);
    if (diff < 60) statusTime.textContent = `${diff}s ago`;
    else statusTime.textContent = `${Math.round(diff / 60)}m ago`;
  }
}
setInterval(updateClock, 1000);

function showErrorBanner(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.remove('hidden');
}
function hideErrorBanner() {
  errorBanner.classList.add('hidden');
}

function updateLapDisplay() {
  lapValue.textContent = `${String(state.leaderLapsCompleted + 1).padStart(3, '0')} / ∞`;
}

/* =====================================================================
 *                            INTERACTION
 * ===================================================================== */
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let hovered = null;
  let bestDist = 36 * 36;
  for (const c of state.cars) {
    const dx = c.x - mx, dy = c.y - my;
    const d2 = dx * dx + dy * dy;
    if (d2 < bestDist) { bestDist = d2; hovered = c; }
  }
  const prevId = state.hoveredCarId;
  state.hoveredCarId = hovered ? hovered.id : null;
  if (prevId !== state.hoveredCarId) {
    for (const child of lbList.children) {
      if (child.dataset.id === state.hoveredCarId) child.classList.add('highlighted');
      else child.classList.remove('highlighted');
    }
  }
  if (hovered) {
    showTooltip(hovered, mx, my);
    canvas.style.cursor = 'pointer';
  } else {
    hideTooltip();
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => {
  state.hoveredCarId = null;
  for (const child of lbList.children) child.classList.remove('highlighted');
  hideTooltip();
});

/* Touch: tap a car to inspect it (mobile). Auto-dismisses after a moment. */
let touchInspectTimer = null;
canvas.addEventListener('touchstart', (e) => {
  if (!e.touches.length) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = t.clientX - rect.left;
  const my = t.clientY - rect.top;
  let hovered = null;
  let bestDist = 46 * 46;            // generous finger radius
  for (const c of state.cars) {
    const dx = c.x - mx, dy = c.y - my;
    const d2 = dx * dx + dy * dy;
    if (d2 < bestDist) { bestDist = d2; hovered = c; }
  }
  if (hovered) {
    clearTimeout(touchInspectTimer);
    state.hoveredCarId = hovered.id;
    for (const child of lbList.children) {
      child.classList.toggle('highlighted', child.dataset.id === hovered.id);
    }
    showTooltip(hovered, mx, my);
  }
}, { passive: true });
canvas.addEventListener('touchend', () => {
  clearTimeout(touchInspectTimer);
  touchInspectTimer = setTimeout(() => {
    state.hoveredCarId = null;
    for (const child of lbList.children) child.classList.remove('highlighted');
    hideTooltip();
  }, 2200);
}, { passive: true });

function showTooltip(car, x, y) {
  const c = car.coin;
  const p1h = c.price_change_percentage_1h_in_currency;
  const p24 = c.price_change_percentage_24h_in_currency;
  const p7d = c.price_change_percentage_7d_in_currency;
  const fmtPct = (v) => {
    if (v == null || isNaN(v)) return '—';
    const cls = v > 0.05 ? 'up' : v < -0.05 ? 'down' : 'flat';
    const arrow = v > 0 ? '▲' : v < 0 ? '▼' : '◆';
    const color = cls === 'up' ? 'var(--neon-green)' : cls === 'down' ? 'var(--neon-red)' : 'var(--text-2)';
    return `<span style="color:${color}">${arrow} ${v.toFixed(2)}%</span>`;
  };
  tooltip.innerHTML = `
    <div class="tt-name" style="color:${car.color}">
      ${c.image ? `<img src="${c.image}" alt="" referrerpolicy="no-referrer" />` : ''}
      ${car.symbol} · ${car.name}
    </div>
    <div class="tt-row"><span class="tt-label">Price</span><span class="tt-value">${formatPrice(c.current_price)}</span></div>
    <div class="tt-row"><span class="tt-label">1h</span><span class="tt-value">${fmtPct(p1h)}</span></div>
    <div class="tt-row"><span class="tt-label">24h</span><span class="tt-value">${fmtPct(p24)}</span></div>
    <div class="tt-row"><span class="tt-label">7d</span><span class="tt-value">${fmtPct(p7d)}</span></div>
    <div class="tt-row"><span class="tt-label">Speed</span><span class="tt-value">${(car.speedMul * 100).toFixed(0)}%</span></div>
  `;
  // clamp position so it stays on screen
  const stageW = stage.clientWidth;
  const stageH = stage.clientHeight;
  const tx = Math.max(110, Math.min(stageW - 110, x));
  const ty = Math.max(120, y);
  tooltip.style.left = tx + 'px';
  tooltip.style.top = (ty - 12) + 'px';
  tooltip.classList.add('visible');
}
function hideTooltip() {
  tooltip.classList.remove('visible');
}

tfSelector.addEventListener('click', (e) => {
  const btn = e.target.closest('.tf-btn');
  if (!btn) return;
  tfSelector.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.timeframe = btn.dataset.tf;
  lbTfLabel.textContent = btn.dataset.tf.toUpperCase();
  // Refresh perf values & rerender list
  for (const c of state.cars) c.perf = getPerf(c.coin);
  positionLeaderboardRows();
});

gridSegment.addEventListener('click', async (e) => {
  const btn = e.target.closest('.grid-btn');
  if (!btn) return;
  if (btn.classList.contains('active')) return;
  gridSegment.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.carCount = +btn.dataset.grid;
  setStatus('loading', 'GRID CHANGE');
  const data = await fetchCoins();
  if (data) {
    state.coins = data;
    syncCarsWithCoins(data);
    rebuildLeaderboardDOM();
    state.lastUpdate = new Date();
    setStatus('live', 'LIVE');
  }
});

modeToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  if (btn.classList.contains('active')) return;
  modeToggle.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.nightMode = btn.dataset.mode === 'night';
  document.body.classList.toggle('night-mode', state.nightMode);
  // Re-bake the track cache with the new palette
  regenerateTrackCache();
});

rankToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('.rank-btn');
  if (!btn) return;
  if (btn.classList.contains('active')) return;
  rankToggle.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.rankingMode = btn.dataset.rank;
  positionLeaderboardRows();
});

pauseBtn.addEventListener('click', () => {
  state.paused = !state.paused;
  pauseBtn.classList.toggle('paused', state.paused);
  pauseIcon.innerHTML = state.paused
    ? '<path d="M8 5v14l11-7z"/>'
    : '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
});

window.addEventListener('resize', () => {
  resizeCanvas();
  generateTrack();
  regenerateTrackCache();
  // re-distribute lane offsets and clamp distance
  const tw = state.trackWidth;
  const spacing = tw / (CFG.LANE_COUNT + 1);
  for (const c of state.cars) {
    if (c.distance > state.totalArc) c.distance = c.distance % state.totalArc;
    c.laneOffset = (c.lane - (CFG.LANE_COUNT - 1) / 2) * spacing;
    c.trail.length = 0;
  }
});

function resizeCanvas() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  state.dpr = dpr;
  const w = stage.clientWidth;
  const h = stage.clientHeight;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* =====================================================================
 *                            BOOT
 * ===================================================================== */
async function refresh() {
  const data = await fetchCoins();
  if (data) {
    state.coins = data;
    syncCarsWithCoins(data);
    rebuildLeaderboardDOM();
    state.lastUpdate = new Date();
    setStatus('live', 'LIVE');
  } else if (state.cars.length === 0) {
    // first failure: use fallback so the UI works as a demo
    state.coins = FALLBACK_COINS.slice(0, state.carCount);
    syncCarsWithCoins(state.coins);
    rebuildLeaderboardDOM();
    state.lastUpdate = new Date();
    setStatus('error', 'DEMO MODE');
  } else {
    setStatus('error', 'OFFLINE');
  }
}

async function init() {
  // carCount is set in state default + via grid segmented buttons
  document.body.classList.toggle('night-mode', state.nightMode);
  resizeCanvas();
  generateTrack();
  regenerateTrackCache();
  await refresh();
  positionLeaderboardRows(true);
  loadingOverlay.classList.add('hidden');
  // Polling
  state.pollTimer = setInterval(() => {
    if (!state.paused) refresh();
  }, CFG.POLL_INTERVAL_MS);
  requestAnimationFrame(loop);
}

init();
</script>
